# Local development and CI migration validation.
# API must stay enabled so CI can smoke-test preview_household_invite via PostgREST.
# Production deploy: .github/workflows/supabase-deploy.yml (db push on main only).

project_id = "ammo-local"

[api]
enabled = true
port = 54321

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = false

[inbucket]
enabled = false

[storage]
enabled = true

[storage.buckets.member-avatars]
public = true
file_size_limit = "5MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp"]

[auth]
enabled = true

# Email confirmation is mandatory: users must verify their address before they
# can sign in. This matches the production Supabase project setting
# (mailer_autoconfirm: false). Enabling double_confirm_changes prevents
# unconfirmed email changes from accidentally locking users out.
[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true

[edge_runtime]
enabled = false
