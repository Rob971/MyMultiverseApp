# Manual QA checklist for Firebase App Distribution testers.
# Single-household model: shared nutrition (grocery + meal plan) for 2+ members.

version: 59
updated: 2026-06-26

summary: |
  Verify auth, household members on Home, nutrition hub (grocery shopping list and weekly meal plan),
  CRUD on shared week data, sync status, Crashlytics on tester builds, and sign-out.
  Welcome Home (Today tab): headline greeting, two circular hero actions (Plan lunch / Shopping list),
  Daily meal plan block with Today vs This week toggle (tonight timeline + update list row), and optional Sunday plan nudge in deep states only.
  Family management lives in profile account sheet (no Family hero on Today).
  Plain-language copy: family (not household) and friendly sync messages with status icons.
  Viewers are read-only: they cannot edit any shared nutrition entry. Invites require auth email to match.
  Seamless onboarding (v44): SSO-only auth screen (terracotta buttons); invite deep link shows "You're invited to join {name}" banner;
  after SSO, new users name their family on a dedicated screen (keyboard opens on the name field); invite join skips family setup and lands on Today.
  Home onboarding (legacy): one-tap Start with [family name] or accept invites for users who already have a household path on Home.
  Welcome content stays hidden until setup completes.
  Empty states: grocery list and solo-household members use guided CTAs (add item / invite someone).
  Post-create: snackbar on Welcome Home offers Invite action to open Household members.
  UI polish: create household is always primary; grocery uses cart icon; destructive actions use terracotta styling.
  Touch targets: grocery row edit/save, meal plan clear, scaffold back, week nav, and overflow actions use 48dp icon buttons.
  Home membership loading and error states use shared Journey loading/error components (teal spinner, terracotta retry).
  Form fields: join household, household member dialogs, grocery inline edit, nutrition AI criteria, and meal plan lunch/dinner use JourneyTextField branding.
  Foundation polish: InkSecondary subtitles, complete typography scale, nutrition AI idle empty state, removed orphaned adventures/budget home strings.
  Wave B mobile polish: snackbars above grocery input bar, inline login/join field validation, pull-to-refresh on grocery and meal plan, route transitions, grocery row min height, animated collapsible chevrons, light haptics on grocery toggle.
  Wave C platform breadth: system dark theme with Napolitan dark palette; grocery side-panel input and two-column meal plan (today vs rest of week) on width >= 600dp; terracotta AI read-only grocery accent.
  Wave C QA (v31): dedicated manual cases for dark theme, wide grocery/meal plan layouts, and AI terracotta accent.
  Home navigation (v32): bottom tabs (Today / Plan / Groceries), profile avatar for account settings, first-win card action buttons, dark-mode readable card text on Welcome Home.
  Phase 1 UX (v34–v35): swipe-to-check, hide checked, viewer banner on Plan, skip entry gate, empty grocery CTA on Today.
  Phase 2 UX (v36): AiHelperSheet bottom sheet on Plan tab; output-first AI copy (no chatbot tone).
  Phase 2 UX (v37): inline AI triggers — empty meal slot “Suggest 20-min meal”, grocery “Build list from this week’s meals” chip, terracotta AI suggestion chips.
  Phase 2 UX (v38): chip-first AI sheet (quick picks generate on tap; criteria behind More options); mode locked from context; plan empty-state AI chips; full-screen AI adviser demoted to deep link only.
  Phase 3 UX (v39): invite share sheet after sending (SMS/WhatsApp with deep link); Sunday empty-week plan nudge on Today (dismissible).
  Dark mode accessibility (v45): household members card rows with role chips and overflow (⋮) menus; semantic ink tokens on auth, invite, join, loading, coming-soon, viewer banner, and AI grocery subtitles for WCAG-readable text in system dark theme.
  Onboarding completion (v46): email/password fallback on auth screen; HTTPS invite App Links (mymultiverse.app/invite); instrumented smoke for auth + household creation screens.
  App Links hosting (v47): deploy via Rob971/mymultiverse-website; verify with scripts/verify-hosting.sh after DNS is live.
  Ghost pairing (v48): adding tortillas/tacos on Groceries shows terracotta “Often bought together” banner; one tap adds salsa, cheese, sour cream; dismiss hides the pairing for your family.
  UX audit S13 (v49): Today hero CTAs replace This week card and first-win checklist; Family hub in account sheet (profile avatar); Napulitano language label with dialect subtitle in picker (not NAP code).
  Global language (v53): globe icon in app headers (auth, onboarding, Home, nutrition screens) plus full picker in account sheet.
  Icon clarity (v59): bolder nav/feature icons (Today, Plan, Groceries); Google/Apple marks on SSO buttons; coming-soon Adventures/Budget row on Today with labeled compass and wallet icons; dedicated sync and keep-screen-on icons.
  Family members invite (v53): single Invite button opens chooser (email invite vs dependant); Admin/Editor/Viewer role badges and descriptions are visually distinct.
  Pantry check E4-10 (v50): meal→grocery splits staples into terracotta Check if you have these section (tap to mark have at home); shopping items stay in Suggested items; adopt-all skips pantry by default.
  Contextual AI chips E4-11 (v52): Plan empty state and AI helper sheet prepend Use up {ingredient} chips from unchecked grocery + meal history (fallback to protein/budget/veggies when no signals).
  Grocery simplification (v54): Groceries tab focuses on Update list (week selector → list CRUD); removed build-from-meals chip, pantry check, and AI suggestion sections from grocery screen; drag handle reorders active items; swipe gestures unchanged.
  Meal plan simplification (v55): Plan tab shows compact week progress then Daily planning day cards; removed bulk generate-grocery, pantry check, and AI suggestion sections; per-meal Add to grocery and Suggest 20-min meal remain on each day.
  Grocery add discoverability (v56): Groceries tab renames Update list to To buy with inline add row (labeled Add button) under the section header on phone; empty-state and all-checked CTAs scroll to and focus the add field; sticky bottom bar keeps labeled Add button; Today timeline shows Shopping list row title instead of Update list.
  Meal plan grocery direct add (v57): Plan tab Add to grocery list writes generated ingredients (including pantry staples) straight to the editable Groceries list — no AI suggestion chips or manual adopt step.
  UX polish (v58): Groceries phone uses a single sticky add bar (no duplicate inline field); delete/clear undo snackbars auto-dismiss; meal plan day labels refresh on language change; auth screens show a prominent language chip with globe icon.

testcases:
  - id: auth-sign-in
    title: Email sign-in and sign-up
    steps:
      - Launch the app with Supabase configured.
      - From the auth screen, tap Continue with email.
      - Note the subtitle changes between Sign in and Sign up modes.
      - Sign up with a new email and password (at least 6 characters), or sign in with an existing account.
      - Tap Back to Google or Apple and confirm SSO buttons return.
      - If email confirmation is enabled, verify the success message appears and confirm via email before signing in.
    expected:
      - Email form opens from the auth screen without losing invite context.
      - Home screen appears after successful authentication.
      - Invalid credentials, weak passwords, and duplicate accounts show clear on-screen messages.

  - id: auth-oauth-redirect
    title: Google or Apple OAuth redirect
    steps:
      - From the auth screen (SSO buttons only), tap Google or Apple (providers enabled in Supabase Dashboard).
      - Complete provider sign-in in the browser; app reopens via app.mymultiverse.kmp://auth/callback.
    expected:
      - New users see the family name setup screen (keyboard focused on the name field), then Today after Create family.
      - Returning users with an active family land on Today without staying on auth.

  - id: home-sign-out
    title: Sign out from home
    steps:
      - On Welcome Home, tap your profile avatar in the top bar → Sign out.
      - On Home onboarding, tap Sign out in the top bar (no settings sheet).
    expected:
      - Login screen returns.

  - id: home-settings-sheet
    title: Account settings sheet on Welcome Home
    steps:
      - Sign in with an active household and land on Welcome Home.
      - Tap your profile avatar in the top-right corner.
    expected:
      - Bottom sheet opens with Family row (household name + manage members), Appearance (System / Light / Dark), Language picker (shows Napulitano not NAP), Export my data, Delete account, Sign out, and app version.
      - Switching Light or Dark updates the app immediately; System follows device setting.
      - Dismiss by swiping down or tapping outside; Home content remains unchanged.

  - id: home-pull-to-refresh
    title: Pull to refresh on Home
    steps:
      - On Welcome Home (or Home onboarding), pull down on the scrollable content.
    expected:
      - Refresh indicator appears; pending invites and nutrition summary update when complete.
      - No duplicate snackbars or layout jump after refresh finishes.

  - id: home-pending-invite
    title: Accept a pending household invite (Home onboarding)
    steps:
      - Sign in as a user who has a pending household invite and no household yet.
      - On Home onboarding, tap Accept on the invite card.
    expected:
      - Snackbar shows you joined the invited household name.
      - Full Home appears; invite card is gone.
      - Opening Nutrition lands on the shared household hub.

  - id: household-gate-pending-invite-two-phone
    title: Two-phone invite — invitee sees invite on Home onboarding (simulate with two accounts)
    steps:
      - Phone A: sign in, create a household, open Household members, invite Phone B's exact login email.
      - Phone B: sign up or sign in with that email; do not create a household first.
      - Phone B: on Home onboarding, confirm the pending invite card appears above Create household.
      - Phone B: tap Accept.
    expected:
      - Phone B reaches Home; both devices show the same household name on Home / Household card.
      - Phone A sees Phone B on the members list after refresh (or after B accepts).

  - id: household-invite-blocked-already-member
    title: Inviter blocked when invitee already belongs to another household
    steps:
      - Phone B: sign in and create a household (or join one).
      - Phone A: sign in, create a different household, open Household members, invite Phone B's email.
    expected:
      - Add-person dialog stays open with a clear error that this person already belongs to another household.
      - No new pending invite is created for B on A's household.

  - id: household-invite-email-mismatch
    title: Invite accept blocked when auth email does not match
    steps:
      - Phone A invites maria@gmail.com.
      - Sign in (or stay signed in) as a different email, e.g. maria@work.com, with a pending invite still addressed to maria@gmail.com.
      - Try to accept the invite from Home onboarding or the pending-invite card on Welcome Home.
    expected:
      - Accept fails with a clear message that the invite was sent to another email and you are signed in as {session_email}.
      - User is told to sign in with the invited address or request a new invite.

  - id: nutrition-viewer-read-only
    title: Viewer role cannot edit shared nutrition data
    steps:
      - Owner invites a second account as Viewer (not Editor) and invitee accepts.
      - Sign in as the viewer; open Nutrition → Grocery, Meal plan, and AI adviser.
      - Attempt to add, edit, toggle, delete, or clear items.
    expected:
      - All lists remain visible (read-only).
      - No add bar, edit actions, delete, clear, or AI write actions are available.
      - If a write is forced (e.g. stale client), server rejects it.

  - id: household-shared-nutrition-two-phone
    title: Two-phone shared grocery (same household)
    steps:
      - Complete home-onboarding or household-gate-pending-invite-two-phone so A and B share one household.
      - Phone A: open Nutrition → Grocery, add or edit an item, wait for sync (online).
      - Phone B: open Nutrition → Grocery, pull to refresh or wait for realtime if enabled.
    expected:
      - Phone B sees Phone A's grocery change in the same week/household scope.

  - id: home-personalized-greeting
    title: Personalized home greeting and inspiration line
    steps:
      - Sign in with an account that has a display name (or use email if no profile name).
      - Land on Welcome Home in the morning, afternoon, and evening (or change device time).
      - Wait for the inspiration line below the greeting to finish loading.
    expected:
      - Greeting uses time-of-day copy and your name when available (e.g. Good morning, Roberto).
      - Inspiration line shows a localized meal-planning tip separate from the greeting.
      - Greeting and inspiration persist while signed in and when navigating back to Home.

  - id: home-nutrition-status
    title: Today tab dashboard hub and week context
    steps:
      - With an active household, open the Today tab.
      - Confirm two circular hero actions below the greeting: Plan lunch and Shopping list (testTags home_hero_plan, home_hero_grocery).
      - In Daily meal plan, switch to This week and confirm week banner.
      - Add grocery items or meal-plan entries on Plan/Groceries tabs; return to Today.
    expected:
      - Week context banner shows under This week when nutrition week data is loaded.
      - Hero Plan lunch opens Plan tab; Shopping list opens Groceries tab.
      - Today tab shows timeline rows for tonight's dinner and Shopping list (grocery progress or add-first-item hint).
      - No duplicate This week nutrition card, first-win checklist, or Family hero on Today.

  - id: home-onboarding-create-household
    title: Home onboarding blocks modules until setup
    steps:
      - Sign in with a new account that has no household and no pending invites.
      - Confirm the Welcome Home This week section is not shown.
      - Observe prefilled household name (last name when available); edit if needed and tap Create household.
    expected:
      - Name availability shows Available before create is enabled; taken names show Taken inline.
      - Hint explains inviting members after creation via the household section on Home.
      - Welcome Home shows This week section and household button after setup.
      - Snackbar offers Invite action that opens Household members.

  - id: home-post-create-invite-snackbar
    title: Post-create invite snackbar on Welcome Home
    steps:
      - Sign in with a new account, create a household on Home onboarding.
      - Land on Welcome Home.
    expected:
      - Snackbar shows household name and Invite action.
      - Tapping Invite opens Household members; dismissing leaves you on Welcome Home.

  - id: home-first-win-checklist
    title: "[Deprecated v49] First-win checklist removed from Today"
    steps:
      - Sign in with a new account and create a household.
      - Land on Today tab with an empty nutrition week.
    expected:
      - Get started together checklist is no longer shown on Today (use hero Plan meals / Family instead).
      - Post-create invite snackbar still offers Invite action to open Household members.

  - id: main-tab-navigation
    title: Bottom navigation between Home, Plan, and Groceries
    steps:
      - Sign in with an active household on Welcome Home.
      - Tap Plan, Groceries, and Today tabs in the bottom bar (testTags main_tab_meal_plan, main_tab_grocery, main_tab_home).
    expected:
      - Plan tab shows the weekly meal plan without a back button.
      - Groceries tab shows the grocery list with add-item bar above the tab bar (phone layout).
      - Today tab returns to Welcome Home with greeting and hero actions (not This week card).

  - id: grocery-empty-state
    title: Grocery list empty state with add CTA
    steps:
      - Open Groceries tab with no items for the current week.
    expected:
      - To buy section header is visible (testTag grocery_to_buy_section).
      - Sticky bottom add bar shows field and labeled Add button (testTags grocery_sticky_input_bar, grocery_add_button).
      - Empty card shows title, body, and Add an item button (testTag grocery_empty_state).
      - Tapping the empty-state button focuses the sticky add field.

  - id: household-solo-invite-empty
    title: Solo household members empty state
    steps:
      - Sign in as owner of a household with only yourself (no pending invites).
      - Open Household members from Home.
    expected:
      - Solo invite empty state appears with Invite CTA (testTag household_members_solo_empty_state).
      - Tapping opens the invite chooser (email invite or dependant).

  - id: home-rename-household
    title: Rename household from Welcome Home (owner or admin)
    steps:
      - Sign in as household owner or household admin on Welcome Home.
      - Tap the highlighted household name chip → Rename dialog.
      - Change to another unique name and save.
    expected:
      - Household card and members screen subtitle show the new name.
      - Duplicate names show Taken; save stays disabled until Available.

  - id: household-admin-role
    title: Owner promotes member to household admin
    steps:
      - Sign in as owner; open Household members.
      - On an editor member row, tap ⋮ (more actions) → Change role → Family admin → confirm promotion.
      - Observe role badges on member rows (owner terracotta, admin teal, editor teal container, viewer muted).
      - Sign in as the promoted admin on another device or account.
    expected:
      - Member rows show name, email, and a role chip (Owner terracotta, others muted).
      - Admin can invite members and change editor/viewer roles; cannot transfer ownership or dissolve.
      - Admin cannot promote others to admin or change another admin's role.
      - Role updated snackbar appears after save.

  - id: nutrition-household-bootstrap
    title: Open nutrition after household is active
    steps:
      - Complete household onboarding (create or accept invite).
      - From Home, open Nutrition.
    expected:
      - Nutrition hub opens directly (no household picker).
      - Household must exist before Nutrition is reachable from Home.

  - id: home-household-members
    title: Open household from the name button
    steps:
      - From Welcome Home, tap the household name button (shows Manage members or View members).
      - Owners/admins: use the edit icon on the button to rename without leaving Home.
    expected:
      - Members screen opens from the main button tap.
      - Rename dialog opens only from the edit icon when permitted.

  - id: household-transfer-ownership-leave
    title: Owner transfers ownership then leaves
    steps:
      - Sign in as household owner with at least one editor member (two accounts).
      - Open Household members → tap ⋮ in the household actions area → Transfer ownership → pick the editor → confirm.
      - Sign in as the former owner (now editor) → ⋮ → Leave household.
    expected:
      - New owner appears on the members list; former owner is editor.
      - Former owner reaches Home onboarding after leaving; shared data is no longer accessible.

  - id: home-export-personal-data
    title: Export personal data (GDPR)
    steps:
      - Sign in and open Welcome Home.
      - Tap ⋮ → Export my data.
    expected:
      - Share sheet opens with JSON export (profile + household affiliation metadata).
      - Success snackbar appears when share completes; error snackbar if share is unavailable (legacy builds only).

  - id: home-delete-account
    title: Delete account (GDPR)
    steps:
      - Sign in as a non-owner member (or sole owner with no other members).
      - On Welcome Home, tap ⋮ → Delete account → confirm in the dialog.
    expected:
      - Account is removed; user returns to login.
      - Household owner with other members sees an error to transfer ownership or dissolve first.

  - id: household-add-dependant
    title: Add household dependant (no login)
    steps:
      - Sign in as household owner or editor.
      - Open Household members → Add dependant → enter display name → confirm.
    expected:
      - Dependant appears on the members list with a dependant badge.
      - Dependant has no email/login; owner/editor can remove them.
      - Dependant counts toward the 20-member household cap.

  - id: household-invite-notification
    title: Invite email / push notification (manual)
    steps:
      - Phone A invites Phone B by email (B already has an account with push token registered).
      - Check B's email inbox and device notifications.
      - Tap the push notification on Android or iOS.
    expected:
      - B receives invite email when Resend is configured in Supabase secrets.
      - B receives an Android push notification when FCM is configured (app `google-services.json` + `FCM_SERVICE_ACCOUNT_JSON` on the edge function).
      - B receives an iOS push notification when APNs secrets are configured and the invitee registered a device token on iOS.
      - Tapping the push opens the join flow (preview + OTP/OAuth) when signed out, or auto-accepts when already signed in with the invited email.
      - OAuth with a different email shows the email-mismatch recovery screen with sign-out retry.

  - id: household-invite-deeplink
    title: Invite deep link from email
    steps:
      - Tap the HTTPS invite link from email (opens invite-open landing page, then MyMultiverse app).
      - Or paste the same HTTPS link into the mobile browser if the button is unavailable.
      - On the auth screen, confirm the terracotta invite banner shows the household name.
      - Complete Google or Apple sign-in with the invited email.
    expected:
      - Landing page offers Open MyMultiverse; app opens with invite token preserved.
      - On Android with verified App Links, https://mymultiverse.app/invite?token=… may open the app directly.
      - Auth screen shows "You're invited to join {household}" when the deep link is active.
      - After SSO, family setup is skipped; user lands on Today with “You joined {household}” snackbar.
      - OAuth with a different email shows the email-mismatch recovery screen with sign-out retry.

  - id: app-links-hosting
    title: Verify mymultiverse.app hosting (website repo)
    steps:
      - Maintainer: connect `mymultiverse.app` to Firebase Hosting (DNS away from Squarespace).
      - Run GitHub Actions workflow **Deploy hosting** in Rob971/mymultiverse-website (or scripts/deploy.sh locally).
      - Run scripts/verify-hosting.sh from a machine with network access.
      - On Android, tap https://mymultiverse.app/invite?token=… from Gmail or Messages (use a real pending invite token).
      - On iOS, repeat with the same HTTPS link after Universal Links are configured.
    expected:
      - verify-hosting.sh passes (assetlinks.json, apple-app-site-association, /invite, homepage, privacy).
      - Android opens the app directly when App Links are verified (no browser chooser).
      - iOS opens the app via Universal Link when entitlements and AASA match the installed build.
      - Invalid or missing token shows the invalid-link message on /invite.

  - id: grocery-ghost-pairing
    title: Ghost pairing banner on grocery list
    steps:
      - Open the Groceries tab with an empty or partial list.
      - Add an item such as Tortillas or Tacos.
      - Observe the terracotta “Often bought together” banner with a + Add … action.
      - Tap the action and confirm suggested items appear on the list.
      - Add Tortillas again on a fresh build (or clear dismiss state) and tap dismiss (X) on the banner.
      - Add Tacos again and confirm the taco pairing banner does not return.
    expected:
      - Banner uses Sparkles + terracotta accent (not teal editable-list styling).
      - One tap adds missing paired items (e.g. salsa, cheese, sour cream for tacos).
      - Dismiss hides that pairing category for your family until settings are cleared.
      - Viewers do not see the banner or pairing actions.

  - id: household-onboarding-create-with-invite
    title: Home onboarding layout when pending invite exists
    steps:
      - Sign in with a pending invite and no household.
      - Observe Home onboarding before accepting or creating.
    expected:
      - Join section shows the pending invite card above the divider.
      - Create household section uses outlined (secondary) styling when invites exist; create is not blocked.
      - Pull-to-refresh reloads pending invites without leaving the screen.

  - id: household-max-members
    title: Household member cap (20)
    steps:
      - Not practical for manual QA on every build; verify in automated tests or staging scripts.
    expected:
      - Product rule: at most 20 members per household; invite/accept returns a clear error at cap (when enforced).

  - id: nutrition-household-members
    title: Invite household members (legacy note)
    steps:
      - Use Home → Household card (members moved from nutrition hub).
    expected:
      - Same as home-household-members.

  - id: nutrition-sync-status
    title: Shared nutrition sync indicator
    steps:
      - Open the nutrition hub while online, then toggle airplane mode and edit grocery.
      - Reconnect and wait for changes to upload.
    expected:
      - Hub shows a banner with icon and plain-language message when shared sync is not idle (updating, waiting, or offline).
      - After reconnect, a brief checkmark confirmation may appear before the banner hides.

  - id: home-tonight-dinner
    title: Tonight's dinner in Daily meal plan timeline
    steps:
      - Sign in with an active family and open the Today tab.
      - Plan dinner for today on the Plan tab, then return to Today.
      - In Daily meal plan (Today tab selected), tap the tonight row or Plan lunch hero.
    expected:
      - Today timeline shows tonight's meal when planned, or empty-state copy with mint marker.
      - Tapping the row or Plan lunch hero switches to the Plan tab.

  - id: home-onboarding-quick-create
    title: One-tap family create on onboarding
    steps:
      - Sign in as a user with no family yet.
      - On Home onboarding, tap Start with [suggested family name] without editing the name field.
    expected:
      - Family is created in one tap; bottom tabs appear on Welcome Home.
      - App switches to the Groceries tab so you can add the first item.
      - Optional name customize and invite cards remain available below.

  - id: grocery-keep-screen-on
    title: Screen stays awake on Groceries tab
    steps:
      - Open the Groceries tab and leave the list visible for 30+ seconds without touching the screen.
      - Optional — tap the lightbulb icon in the grocery header to turn keep-awake off, then on again.
    expected:
      - Screen does not dim or lock while the grocery list is open (lightbulb icon highlighted teal by default).
      - Tapping the lightbulb turns keep-awake off (muted icon); screen may dim normally.
      - Leaving Groceries (another tab) allows normal screen timeout again.

  - id: meal-plan-add-to-grocery-hero
    title: Hero Add to grocery list per meal
    steps:
      - Open Plan tab and expand a day with a planned lunch or dinner.
    expected:
      - Each planned meal shows a primary Add to grocery list button (not a small text link).
      - Tapping it adds generated ingredients directly to the Groceries tab list (snackbar confirms count).

  - id: grocery-swipe-to-check
    title: Swipe to check grocery items
    steps:
      - Open Groceries with at least one unchecked item.
      - Swipe a row to the right to check it off; swipe left on another row to delete (confirm undo if shown).
      - Tap a row or checkbox to toggle as before.
    expected:
      - Right swipe checks/unchecks with haptic feedback; left swipe still deletes.
      - Row tap and checkbox remain available.

  - id: grocery-shopping-hide-checked
    title: Shopping mode hide checked items
    steps:
      - Check off one or more grocery items.
      - Tap Hide checked items below the progress card.
    expected:
      - Unchecked items stay visible at the top; checked section disappears.
      - Show checked items restores the completed section.

  - id: viewer-readonly-grocery-plan
    title: Viewer read-only banner on Groceries and Plan
    steps:
      - Sign in as a household viewer (read-only role).
      - Open Groceries tab, then Plan tab.
    expected:
      - Read-only banner appears near the top of each tab.
      - Input fields and edit actions are disabled; lists remain readable.

  - id: home-grocery-empty-cta
    title: Grocery list hero on Today tab
    steps:
      - Sign in with an active family and an empty grocery list.
      - Open the Today tab.
    expected:
      - Grocery list hero button is visible (testTag home_hero_grocery).
      - Tapping it opens the Groceries tab.

  - id: nutrition-tabs-skip-entry-gate
    title: Plan and Groceries tabs skip entry gate when family is active
    steps:
      - Complete family setup and land on Welcome Home with bottom tabs.
      - Switch to Plan, then Groceries, without opening nutrition from a deep link.
    expected:
      - No household setup gate or ensure-household loading screen on tab switch.
      - Meal plan or grocery list appears directly.

  - id: ai-helper-sheet-meal-plan
    title: AI helper sheet from Plan tab
    steps:
      - Sign in with write access and open the Plan tab.
      - Tap Plan with AI (header or empty-week CTA).
      - Pick a quick pick, tap Generate, review preview, tap Apply to plan.
    expected:
      - Bottom sheet opens over the meal plan (~60% height); list stays visible behind.
      - Sheet dismisses after Apply to plan; meals appear on the plan.
      - AI copy is brief and output-first (Suggestions, Quick picks, Generate).

  - id: ai-suggest-quick-meal-slot
    title: Suggest 20-min meal on empty meal slot
    steps:
      - Sign in with write access and open the Plan tab.
      - Expand a day card with an empty lunch or dinner slot.
      - Tap Suggest 20-min meal (sparkles, terracotta tertiary button).
      - Generate preview in the AI helper sheet and apply to the plan.
    expected:
      - AI helper sheet opens in meal-plan mode scoped to that day with quick-meal criteria pre-filled.
      - Apply fills the empty slot; sheet dismisses; meal text appears in the slot.

  - id: ai-grocery-build-from-meals-chip
    title: Build grocery list from planned meals (meal plan AI)
    steps:
      - Sign in with write access; add at least one lunch or dinner on the Plan tab.
      - Use meal-level Add to grocery list or AI helper sheet in grocery mode from Plan.
      - Open Groceries tab and confirm adopted items appear under Update list.
    expected:
      - Grocery items generated from meals appear on the editable grocery list.
      - Groceries tab no longer shows a build-from-meals chip (simplified layout).

  - id: ai-suggestion-chips-terracotta
    title: Terracotta AI suggestion chips (not teal)
    steps:
      - Open Plan or Groceries with AI suggestion chips visible (meal name chips or grocery + chips).
      - Compare chip colors with primary teal buttons (Generate, Add to grocery list).
    expected:
      - AI-origin chips use terracotta accent (sparkles + chip border/text), not Mediterranean teal.
      - Add all link in AI read-only grocery section uses terracotta, not teal.

  - id: ai-helper-sheet-chip-first
    title: Chip-first AI helper sheet (no mode switcher)
    steps:
      - Open Plan or Groceries and launch the AI helper sheet (Plan with AI, empty-state chip, or build-from-meals).
      - Note quick picks are visible; Advice/Grocery/Meal plan mode switcher is hidden.
      - Tap a quick pick and confirm generation starts without typing.
      - Tap More options and confirm the criteria field and Generate button appear.
    expected:
      - Sheet opens in the mode implied by where you launched (meal plan vs grocery).
      - No mode switcher chips in the default sheet flow.
      - Quick pick tap generates; More options reveals custom criteria field.

  - id: meal-plan-empty-ai-chips
    title: Quick meal suggestion from empty slot (replaces empty-state AI chips)
    steps:
      - Open Plan tab on an empty week.
      - Expand today (or another day) in Daily planning.
      - Tap Suggest 20-min meal on an empty lunch or dinner slot.
    expected:
      - No terracotta chips or Plan with AI on the empty-state card (only Add meals below).
      - AI helper sheet opens for that slot with quick-meal criteria.

  - id: home-nutrition-card
    title: Plan meals hero on Today tab
    steps:
      - Launch the app and go to Today with an active household.
      - Tap Plan meals (testTag home_hero_plan).
    expected:
      - Plan tab opens with the weekly meal plan (no nutrition hub intermediary).

  - id: hub-layout-order
    title: Nutrition hub section order
    steps:
      - Open the nutrition hub on a household with grocery and meal plan enabled.
      - Scroll through the hub cards top to bottom.
    expected:
      - Grocery shopping and Weekly meal plan cards are shown (no separate AI adviser card).
      - Each card shows a progress or status line when data exists.

  - id: hub-meal-plan-navigation
    title: Open weekly meal plan from hub
    steps:
      - From Nutrition hub, tap the Weekly meal plan card.
    expected:
      - Meal plan screen shows the current week label and today highlighted.
      - Days can expand to edit lunch and dinner.

  - id: hub-members-navigation
    title: Open household members from account sheet
    steps:
      - From Today, tap profile avatar to open account settings, then tap the Family row (testTag home_account_family_hub).
      - Scan member rows for role chips and ⋮ overflow on editable members.
    expected:
      - Members screen lists the owner, active members, and pending invites in card rows.
      - Owner role chip is terracotta; subtitles and emails remain readable in light and dark mode.

  - id: nutrition-section-back
    title: Back from nutrition section to hub
    steps:
      - From the hub, open Grocery (or Meal plan / AI adviser).
      - Tap the back control in the top bar.
    expected:
      - Returns to the nutrition hub with the same household context (no household picker).

  - id: crashlytics-smoke
    title: Firebase Crashlytics (tester builds with google-services)
    steps:
      - Install a CI or local debug APK built with google-services.json configured.
      - Use the app normally (sign in, open Nutrition, edit grocery).
      - Optional: trigger a non-fatal path (e.g. airplane mode during sync) and confirm no user-visible crash.
    expected:
      - Crashes and non-fatal errors appear in Firebase Console → Crashlytics with app version, user id (after sign-in), and breadcrumbs (session_start, nutrition_household_activated).

  - id: hub-grocery-navigation
    title: Open editable grocery list
    steps:
      - From Nutrition hub, tap the Grocery card.
    expected:
      - Grocery screen shows week label, empty state or existing items, and add field (sticky bottom bar on phone; right side panel when shortest width >= 600dp).
      - Keyboard does not cover the input when typing.

  - id: grocery-crud
    title: Add, check off, edit, reorder, and delete grocery items
    steps:
      - Open Groceries tab; confirm To buy section appears directly under Week starting.
      - Add two items (e.g. Milk, Bread) using the sticky bottom bar (phone) or side panel (wide).
      - Try adding a duplicate item with different casing or spacing.
      - Drag the handle on an active row to reorder items.
      - Tap checkbox on one item to mark it checked.
      - Use Clear checked and tap Undo from the snackbar.
      - Edit an item label inline.
      - Swipe right to check an item; swipe left to delete and use Undo if shown.
    expected:
      - To buy subtitle shows progress when items exist, or add hint when empty.
      - Section header Add action focuses the sticky add field on phone.
      - Delete and clear-checked undo snackbars auto-dismiss after a few seconds unless Undo is tapped.
      - Duplicate entry scrolls to the existing row with no error snackbar; list still has one row.
      - Reorder persists after leaving and returning to the screen.
      - Checked items move to Checked off section.
      - Clear checked removes completed items and Undo restores them in order.
      - Changes persist after leaving and returning to the screen.
      - Second household member sees the same grocery list after sync.

  - id: grocery-ai-suggestion-chips
    title: AI grocery suggestion chips on meal plan screen
    steps:
      - Generate AI grocery items from a meal on Weekly meal plan (see meal-plan-meal-grocery).
      - Open the Plan tab and scroll to the AI grocery suggestions section.
      - Tap one or more suggestion chips (e.g. + Salt, + Olive oil).
      - Open Groceries tab and confirm adopted items appear in Update list.
    expected:
      - Terracotta AI suggestion chips appear on the meal plan screen (not on Groceries).
      - Tapping a chip adds the item to the shared grocery list.
      - Adopted items show under Update list on the Groceries tab.

  - id: grocery-completed-collapse
    title: Collapse checked-off grocery items
    steps:
      - Add and check off more than three items on the Grocery screen.
      - Observe the "Checked off" section header.
      - Tap the header to expand, then tap again to collapse.
    expected:
      - More than three checked items start collapsed by default.
      - Header shows count (e.g. Checked off (4)).
      - Tap toggles visibility; Clear checked still works from the header.

  - id: meal-plan-edit
    title: Edit weekly meal plan
    steps:
      - Open the Plan tab (Week food planning).
      - Confirm week selector and meals-planned progress appear at the top, then Daily planning section.
      - Expand a day (if collapsed) and enter lunch and dinner text for today or another day.
    expected:
      - No bulk generate-grocery, pantry check, or suggested-items sections on the Plan screen.
      - Today is highlighted; other days can expand/collapse.
      - Lunch and dinner fields save while on screen.
      - Progress shows meals planned (e.g. 2 of 14).

  - id: meal-plan-next-week
    title: Plan meals for next week
    steps:
      - Open Weekly meal plan.
      - Tap next week in the week banner and enter a meal.
      - Open Grocery shopping.
    expected:
      - Both screens show the same next-week date range.

  - id: meal-plan-empty-state
    title: Empty meal plan guidance
    steps:
      - Open Plan tab with no meals entered.
      - Tap Add meals below on the empty-state card.
    expected:
      - Scroll focuses the Daily planning section with day cards.
      - Use Suggest 20-min meal on an empty lunch/dinner slot to open the AI helper sheet.

  - id: meal-plan-bulk-grocery
    title: Per-meal grocery from planned meals (removed bulk action)
    steps:
      - Enter meals on at least two days on the Plan tab.
      - Use Add to grocery list under each filled meal slot (not a week-level bulk button).
      - Open Groceries tab and confirm items appear under Update list.
    expected:
      - No Generate groceries for planned meals button at the top of Plan.
      - Per-meal grocery actions still work with snackbar feedback.
      - Generated items appear on the Groceries tab without manual adopt.

  - id: meal-plan-direct-grocery-add
    title: Meal slot Add to grocery list writes to Groceries tab
    steps:
      - Enter a meal and tap Add to grocery list under that slot.
      - Open Groceries tab.
    expected:
      - Plan tab shows no Suggested items or Add all chips.
      - Generated ingredients (including staples like garlic or olive oil) appear under To buy on Groceries.
      - Second tap on the same meal shows none-new snackbar when all labels are already on the list.

  - id: meal-plan-meal-autocomplete
    title: Meal name suggestions while typing
    steps:
      - Enter a lunch on Monday (e.g. Pasta carbonara).
      - On Tuesday lunch, type at least two letters matching that meal (e.g. pas).
    expected:
      - Suggestion chips appear; tapping one fills the field.

  - id: meal-plan-copy-leftovers
    title: Copy dinner to tomorrow lunch
    steps:
      - Enter dinner on a weekday before Sunday.
      - Tap Copy to tomorrow's lunch.
    expected:
      - Tomorrow lunch is filled with the dinner text.

  - id: meal-plan-clear-week
    title: Clear week meals
    steps:
      - Enter meals on several days.
      - Overflow menu → Clear week → confirm.
    expected:
      - All meal fields reset for the selected week.

  - id: meal-plan-meal-grocery
    title: Add grocery items from a single meal
    steps:
      - On Plan tab, enter a non-empty lunch (e.g. Pasta primavera).
      - Tap Add to grocery list under the lunch field.
      - Open Groceries tab.
    expected:
      - Snackbar confirms items were generated (or none new if duplicates).
      - Plan tab stays uncluttered (no pantry or suggestion chip sections).
      - New items appear under To buy on Groceries immediately (no adopt step).

  - id: ai-advice
    title: AI meal planning from empty slot
    steps:
      - Open Plan tab with an empty lunch or dinner slot.
      - Tap Suggest 20-min meal on that slot.
    expected:
      - AI helper sheet opens scoped to that day and slot.
      - Plan screen layout remains week overview + Daily planning only.

  - id: ai-grocery-mode
    title: AI grocery list from meal plan
    steps:
      - Open Weekly meal plan, enter a meal, tap Generate AI grocery list.
      - Or tap Generate groceries for planned meals after filling multiple days.
    expected:
      - AI suggestion chips appear on meal plan and Grocery screens; tap Add all to list or individual chips.

  - id: ai-meal-plan-mode
    title: AI meal plan preview and apply
    steps:
      - Weekly meal plan → Plan week with AI (header or empty state).
      - Enter criteria, generate preview, tap Apply to meal plan.
    expected:
      - Preview shows lunch/dinner lines; apply fills the selected week's meal fields.

  - id: wavec-dark-theme-napolitan
    title: System dark theme (Napolitan palette)
    steps:
      - Sign in with an active household.
      - Enable system dark mode (Settings → Display → Dark theme, or quick settings).
      - Visit Welcome Home, Nutrition hub, Grocery shopping, Weekly meal plan, and Household members.
      - Sign out and spot-check the auth screen subtitle and any invite/join screens you can reach.
      - Toggle back to light mode and spot-check the same screens.
    expected:
      - Dark mode uses warm charcoal backgrounds (not pure black); body text stays readable on cards and glass surfaces.
      - Welcome Home first-win card, nutrition status line, household subtitle, member emails, and role chips are legible (no dark-on-dark gray text).
      - Auth, invite join, loading spinners, coming-soon rows, and viewer read-only banner use light primary/muted ink on dark surfaces.
      - Napolitan background illustration is subdued (low alpha); primary terracotta and teal accents remain visible.
      - No hardcoded light-only gray text; subtitles and empty states remain legible.
      - Switching light ↔ dark updates visible screens without stale colors after navigation.

  - id: wavec-wide-grocery-side-panel
    title: Wide grocery layout (side-panel input)
    steps:
      - Use a tablet, foldable inner display, or emulator with shortest width >= 600dp (e.g. Pixel Tablet, 7" tablet AVD).
      - Sign in as an editor; open Nutrition → Grocery shopping.
      - Add an item from the input area; confirm list scroll and pull-to-refresh still work.
      - Rotate or resize below 600dp width if possible.
    expected:
      - List occupies the main area on the left; add field and + button sit in a fixed right panel (testTag grocery_sticky_input_bar).
      - No duplicate bottom sticky bar on wide layout; snackbars are not hidden behind input.
      - Adding items works from the side panel; list updates immediately.
      - Below 600dp width, layout falls back to phone mode (bottom sticky input bar).

  - id: wavec-wide-meal-plan-columns
    title: Wide meal plan layout (today vs week columns)
    steps:
      - Use a tablet or emulator with shortest width >= 600dp.
      - Open Weekly meal plan on the current week (today visible in the week banner).
      - Ensure at least one upcoming day exists in the plan or expand a day card.
      - Resize below 600dp or switch to a phone.
    expected:
      - On wide layout, Today section and day cards appear in the left column; Rest of week (or Days) header and remaining day cards appear in the right column.
      - Header, empty state, bulk grocery button, and AI chips remain full width above the columns.
      - Day expand/collapse and meal editing work in both columns.
      - Below 600dp, layout falls back to single-column stacked days (today block, then upcoming days).

  - id: wavec-ai-grocery-terracotta-accent
    title: AI read-only grocery terracotta accent
    steps:
      - As an editor, open Weekly meal plan, enter a meal, and tap Generate AI grocery list (or Generate groceries for planned meals).
      - Open Grocery shopping and scroll to the AI suggestions section (read-only cards, not editable list rows).
      - Compare with regular grocery item rows and meal-plan teal actions.
    expected:
      - AI suggestion cards use terracotta sparkles icon and terracotta left border accent (not Mediterranean teal).
      - Subtitle under the section header uses muted ink; card labels use primary ink and remain readable in light and dark mode.
      - Tapping Add all or individual adopt actions still moves items into the editable grocery list.

  - id: phase3-invite-share-sheet
    title: Invite share sheet with pre-written message
    steps:
      - As household owner, open Household members and invite someone by email.
      - When the invite is sent, confirm the system share sheet opens (or tap Share on the pending invite row).
      - Share via Messages or copy the text.
    expected:
      - Share message includes the household name and an HTTPS invite link (https://mymultiverse.app/invite?token=…).
      - Pending invite row shows a Share button for resending.
      - Snackbar confirms invite sent.

  - id: phase3-sunday-plan-nudge
    title: Sunday empty-week nudge on Today
    steps:
      - On a Sunday (or simulate empty current week with no meal slots), open the Today tab with an active household.
      - Confirm a gentle plan-week nudge appears above This week when the meal plan is empty.
      - Tap Dismiss, then pull to refresh.
    expected:
      - Nudge is dismissible and does not block navigation.
      - Open meal plan CTA navigates to Plan tab.
      - Nudge stays hidden for the same week after dismiss; returns next Sunday if the week is still empty.

  - id: phase3-member-joined-push
    title: Push when a household member joins
    steps:
      - With two accounts in the same household, register push tokens on device A (existing member).
      - On device B, accept a household invite (or add member flow completes).
      - On device A, confirm a push notification arrives (foreground shows a local notification; background uses system tray).
      - Tap the notification.
    expected:
      - Push title mentions the new member; opens the app to Household members when the active household matches.
      - Invite push still deep-links to join flow when the invitee receives an invite notification.

  - id: phase3-grocery-collaboration-snackbar
    title: Debounced grocery activity snackbar
    steps:
      - Two editors on the same household week: account A on Grocery tab, account B adds or checks off an item remotely.
      - Wait ~2 seconds after the remote change syncs on A.
    expected:
      - A non-blocking snackbar names the remote member and item (e.g. Maria added milk) or batches multiple updates.
      - No snackbar for the user's own edits; no chat UI.

  - id: s10-meal-suggest-ingredients-sheet
    title: Inline meal suggest → apply → optional ingredients in one sheet
    steps:
      - On Weekly meal plan, tap Suggest with AI on an empty lunch or dinner slot.
      - Wait for preview, tap Apply to plan.
      - Review suggested ingredients; tap Add all to list or Skip for now.
    expected:
      - Sheet stays open after apply with an ingredients step (terracotta read-only list).
      - Add all moves items to editable grocery list; Skip dismisses without adding.
      - Meal text is saved on the plan before the ingredients step.

  - id: s10-font-scaling-grocery-meal-plan
    title: System font scaling on grocery and meal plan
    steps:
      - In device Settings, increase Display font size (or largest accessibility text).
      - Open Grocery list with a long item name and Meal plan with collapsed day summaries.
    expected:
      - Grocery rows and text fields grow with font scale; labels are not clipped at default row height.
      - Collapsed day summaries wrap on meal plan cards.

  - id: s11-home-week-context-banner
    title: Week context banner on Today
    steps:
      - Open the Today tab with an active household and synced nutrition week.
    expected:
      - Teal week banner shows the current week range (same week key as Plan and Groceries).
      - Banner appears below the greeting and above This week content.

  - id: s11-tab-bar-ai-accessibility
    title: Tab bar and AI entry accessibility
    steps:
      - Enable TalkBack (or VoiceOver on iOS when available).
      - Navigate bottom tabs and an inline AI trigger (Suggest with AI on Plan, or Build from meals on Groceries).
    expected:
      - Each tab announces Today, Plan, and Groceries.
      - AI inline triggers announce their full label as one control.

  - id: language-picker
    title: App language from header or settings
    steps:
      - On the auth screen (before sign-in), tap the globe icon and switch language.
      - After sign-in on Welcome Home, use the globe in the top bar or open account sheet → Language picker.
      - Visit Nutrition hub and Family members to confirm strings update.
    expected:
      - Auth, Home, nutrition, and members strings update for the selected locale (EN, FR, ES, DE, IT, Napoli, AR).
      - Napulitano option shows dialect subtitle in the dropdown.

  - id: icon-clarity-coming-soon-row
    title: Coming soon Adventures and Budget row on Today
    steps:
      - Open the Today tab on Welcome Home.
      - Scroll below the Daily meal plan block.
    expected:
      - Card shows Adventures and Budget labels each with a distinct icon (compass terracotta, wallet teal) and a Coming soon badge.
      - Hint text explains trips and shared finances are on the roadmap (testTag home_coming_soon_row).

  - id: icon-clarity-sso-auth
    title: SSO provider icons on auth
    steps:
      - Sign out and open the auth screen.
      - Observe Continue with Google and Continue with Apple buttons.
    expected:
      - Each SSO button shows its provider icon beside the label (not text-only).
      - Icons remain visible in light and dark system theme.

  - id: icon-clarity-grocery-sync-keepawake
    title: Grocery keep-awake and sync status icons
    steps:
      - Open Groceries tab; tap the keep-screen-on control in the top bar.
      - If sync banner appears (pending or offline), note its icon.
    expected:
      - Keep-screen-on uses a phone-with-sun icon (not a lightbulb).
      - Sync pending shows upload/sync icon; offline shows cloud-off; synced shows cloud-check (distinct from grocery row checkmarks).

  - id: supabase-persistence-smoke
    title: Supabase household persistence (two accounts)
    steps:
      - Account A signs in, opens Nutrition, adds a grocery item online.
      - Account B (invited household member) signs in on another device, opens Nutrition.
    expected:
      - Account B sees the same household hub and synced grocery item after refresh.
      - Run scripts/verify-supabase-household.sh locally before distributing if you are the release owner.
