  - id: grocery-check-delete-buttons
    title: Checkbox, edit, and delete controls on grocery rows
    steps:
      - Open Groceries with at least one unchecked item.
      - Observe the left side of each row has a standard checkbox (hollow square with muted border when unchecked).
      - Observe unchecked rows also have a teal pencil circle (edit) and a terracotta circle (delete ×) on the right.
      - Tap the checkbox to mark an item as bought; box fills solid teal with a white ✓ checkmark; label turns muted with strikethrough; the edit circle disappears.
      - Tap the filled checkbox again on a checked item to uncheck it; box returns to hollow; edit circle reappears.
      - Switch the device to dark mode: verify checkbox states remain highly distinguishable (hollow border vs solid teal fill with white ✓).
      - Tap the teal pencil circle on an unchecked item; inline edit field opens.
      - Edit the label and tap the confirm icon (or press Done on keyboard) to save; or tap Cancel to discard.
      - Double-tap directly on an item label as an alternate way to open the edit field.
      - Tap the terracotta × circle on an item; confirm the Remove item? dialog by tapping Remove.
      - Tap the × circle on another item and tap Cancel to dismiss without deleting.
    expected:
      - Unchecked checkbox: hollow square with muted gray border — clearly "not done" state.
      - Checked checkbox: solid teal square with white ✓ checkmark — clearly "done/purchased" state.
      - Both states render correctly in light and dark themes with strong visual contrast.
      - Haptic feedback plays on toggle.
      - Edit pencil circle visible for unchecked items; disappears when item is checked.
      - Terracotta delete × circle visible on all editable rows (checked and unchecked).
      - Remove item? confirmation dialog appears before deletion; undo snackbar appears after.
      - Tapping Cancel or outside the dialog leaves the item unchanged.

  - id: grocery-inline-edit
    title: Inline item editing via edit button
    steps:
      - Open Groceries with at least one unchecked item.
      - Tap the pencil edit button on an unchecked item to enter edit mode.
      - Change the item label and tap the teal confirm icon (or press Done); observe the new label in the list.
      - Tap the pencil button again and tap Cancel; confirm the original label is preserved.
      - Double-tap directly on the item label text as an alternate way to open the edit field.
    expected:
      - Edit field opens with the current label pre-filled.
      - Saving an empty or duplicate label is rejected (confirm icon disabled for blank, snackbar for duplicate).
      - Cancelling discards any changes without modifying the item.
      - Double-tap on the item text area opens the same inline edit field.

  - id: grocery-shopping-hide-checked
