name: Supabase Deploy

on:
  push:
    branches:
      - main
      - master
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - "supabase/functions/**"
      - "scripts/configure-household-notification-delivery.sh"
      - "scripts/verify-household-notification-delivery.sh"
      - "scripts/supabase-link-remote.sh"
      - "scripts/lib/supabase-remote-psql.sh"
      - ".github/workflows/supabase-deploy.yml"
  workflow_dispatch:

concurrency:
  group: supabase-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-gate:
    name: Deploy gate
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.evaluate.outputs.run }}
    steps:
      - name: Evaluate skip rules
        id: evaluate
        run: |
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          msg="${{ github.event.head_commit.message }}"
          if [[ "$msg" == *"[skip ci]"* ]] || [[ "$msg" == *"[ci skip]"* ]] || [[ "$msg" == chore\(version\):* ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Supabase deploy for automated/version-only push."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-migrations:
    name: Deploy migrations
    runs-on: ubuntu-latest
    needs: deploy-gate
    timeout-minutes: 8
    if: ${{ needs.deploy-gate.outputs.run == 'true' }}

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Require deploy secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Configure repository secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF"
            echo "Migrations are still validated in KMP CI (supabase db start). Deploy is skipped until secrets exist."
            exit 1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "NOTE: SUPABASE_DB_PASSWORD not set — using access-token database login."
          fi

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.109.0

      - name: Link project and push migrations
        env:
          SUPABASE_DB_PASSWORD: ""
        run: |
          chmod +x ./scripts/supabase-link-remote.sh
          ./scripts/supabase-link-remote.sh
          supabase db push

      - name: Configure notification outbox delivery
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "WARN: SUPABASE_URL/SUPABASE_ANON_KEY not set — outbox auto-dispatch not configured."
            exit 0
          fi
          ./scripts/configure-household-notification-delivery.sh

      - name: Verify notification outbox delivery
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Skipping delivery verify (SUPABASE_URL/SUPABASE_ANON_KEY not set)."
            exit 0
          fi
          ./scripts/verify-household-notification-delivery.sh

  deploy-edge-functions:
    name: Deploy edge functions
    runs-on: ubuntu-latest
    needs:
      - deploy-gate
      - deploy-migrations
    timeout-minutes: 10
    if: ${{ needs.deploy-gate.outputs.run == 'true' }}

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      INVITE_FROM_EMAIL: ${{ secrets.INVITE_FROM_EMAIL }}
      FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
      APNS_KEY_ID: ${{ secrets.APNS_KEY_ID }}
      APNS_TEAM_ID: ${{ secrets.APNS_TEAM_ID }}
      APNS_PRIVATE_KEY: ${{ secrets.APNS_PRIVATE_KEY }}
      APNS_BUNDLE_ID: ${{ secrets.APNS_BUNDLE_ID }}
      APNS_USE_SANDBOX: ${{ secrets.APNS_USE_SANDBOX }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Require deploy secrets
        run: |
          missing=0
          for name in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing repository secret: ${name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Edge function deploy requires Supabase project + runtime secrets (see README Backend → Edge functions)."
            exit 1
          fi
          if [ -z "$RESEND_API_KEY" ]; then
            echo "WARN: RESEND_API_KEY not set — invite emails will be log-only until configured."
          fi
          if [ -z "$INVITE_FROM_EMAIL" ]; then
            echo "INVITE_FROM_EMAIL not set; function default Ammò <invites@mymultiverse.app> will be used."
          fi
          if [ -z "$FCM_SERVICE_ACCOUNT_JSON" ]; then
            echo "WARN: FCM_SERVICE_ACCOUNT_JSON not set — Android push delivery will be skipped until configured."
          fi
          if [ -z "$APNS_KEY_ID" ] || [ -z "$APNS_TEAM_ID" ] || [ -z "$APNS_PRIVATE_KEY" ]; then
            echo "WARN: APNS_KEY_ID/APNS_TEAM_ID/APNS_PRIVATE_KEY not set — iOS push delivery will be skipped until configured."
          fi

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.109.0

      - name: Link project
        env:
          SUPABASE_DB_PASSWORD: ""
        run: |
          chmod +x ./scripts/supabase-link-remote.sh
          ./scripts/supabase-link-remote.sh

      - name: Set edge function secrets
        run: |
          invite_from="${INVITE_FROM_EMAIL:-Ammò <invites@mymultiverse.app>}"
          invite_open_base="${INVITE_OPEN_LINK_BASE:-https://mymultiverse.app/invite}"
          apns_bundle="${APNS_BUNDLE_ID:-app.mymultiverse.ammo}"
          apns_sandbox="${APNS_USE_SANDBOX:-true}"
          supabase secrets set \
            "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}" \
            "RESEND_API_KEY=${RESEND_API_KEY:-}" \
            "INVITE_FROM_EMAIL=${invite_from}" \
            "INVITE_OPEN_LINK_BASE=${invite_open_base}" \
            "FCM_SERVICE_ACCOUNT_JSON=${FCM_SERVICE_ACCOUNT_JSON:-}" \
            "APNS_KEY_ID=${APNS_KEY_ID:-}" \
            "APNS_TEAM_ID=${APNS_TEAM_ID:-}" \
            "APNS_PRIVATE_KEY=${APNS_PRIVATE_KEY:-}" \
            "APNS_BUNDLE_ID=${apns_bundle}" \
            "APNS_USE_SANDBOX=${apns_sandbox}" \
            --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy P2 edge functions
        run: |
          supabase functions deploy notify-household-invite --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy invite-open --no-verify-jwt --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy delete-account --project-ref "$SUPABASE_PROJECT_REF"

      - name: Smoke probe edge functions
        run: ./scripts/verify-supabase-edge-functions.sh
