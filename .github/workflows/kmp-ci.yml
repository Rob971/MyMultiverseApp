name: KMP CI

on:
  push:
    branches:
      - main
      - master
      - "feature/**"
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - reopened
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run (use all for the full pipeline)"
        required: true
        default: all
        type: choice
        options:
          - all
          - android-unit-tests
          - android-instrumented-tests
          - android-apk
          - firebase-release
          - ios-compatibility
      source_run_id:
        description: "Optional workflow run ID for firebase-release-only (reuses APK after unit, instrumented, and APK jobs succeeded). Defaults to the latest successful pipeline on this branch."
        required: false
        type: string

concurrency:
  group: kmp-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  FIREBASE_APP_ID: "1:37917280954:android:f25a8ccc787de9f3f91083"
  FIREBASE_PROJECT_ID: "mymultiverseapp"

jobs:
  android-tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      ${{ github.event_name == 'push' ||
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' &&
            (github.event.inputs.job == 'all' || github.event.inputs.job == 'android-unit-tests')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run Android unit tests
        run: ./gradlew :composeApp:testDebugUnitTest

  android-instrumented-tests:
    name: Android Instrumented UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      ${{ github.event_name == 'push' ||
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' &&
            (github.event.inputs.job == 'all' || github.event.inputs.job == 'android-instrumented-tests')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install emulator runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpulse0

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          disable-animations: true
          emulator-options: -no-snapshot-save -no-boot-anim -gpu swiftshader_indirect -no-audio
          script: ./gradlew :composeApp:connectedDebugAndroidTest --build-cache

  android-apk:
    name: Android Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: >-
      ${{ github.event_name == 'push' ||
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' &&
            (github.event.inputs.job == 'all' || github.event.inputs.job == 'android-apk')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Compile Android debug Kotlin
        run: ./gradlew :composeApp:compileDebugKotlinAndroid

      - name: Assemble Android debug APK
        run: ./gradlew :composeApp:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: composeApp-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  firebase-release:
    name: Firebase Release Upload
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - android-tests
      - android-instrumented-tests
      - android-apk
    if: >-
      ${{ always() && (
          ((github.event_name == 'push' || github.event_name == 'pull_request') &&
            needs.android-tests.result == 'success' &&
            needs.android-instrumented-tests.result == 'success' &&
            needs.android-apk.result == 'success') ||
          (github.event_name == 'workflow_dispatch' &&
            github.event.inputs.job == 'all' &&
            needs.android-tests.result == 'success' &&
            needs.android-instrumented-tests.result == 'success' &&
            needs.android-apk.result == 'success') ||
          (github.event_name == 'workflow_dispatch' &&
            github.event.inputs.job == 'firebase-release')
        ) }}

    steps:
      - name: Checkout
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'firebase-release'
        uses: actions/checkout@v4

      - name: Resolve prior successful pipeline run
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'firebase-release'
        id: source-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          run_has_prerequisites() {
            gh run view "$1" --json jobs --jq '
              ([.jobs[] | select(.name == "Android Unit Tests" and .conclusion == "success")] | length > 0) and
              ([.jobs[] | select(.name == "Android Instrumented UI Tests" and .conclusion == "success")] | length > 0) and
              ([.jobs[] | select(.name == "Android Debug APK" and .conclusion == "success")] | length > 0)
            '
          }

          RUN_ID="${{ github.event.inputs.source_run_id }}"
          if [ -n "$RUN_ID" ]; then
            if [ "$(run_has_prerequisites "$RUN_ID")" != "true" ]; then
              echo "Run $RUN_ID is missing a successful unit test, instrumented test, or APK job."
              exit 1
            fi
            echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="${GITHUB_REF#refs/heads/}"
          RUN_ID=$(gh run list \
            --workflow=kmp-ci.yml \
            --branch="$BRANCH" \
            --status=success \
            --limit=30 \
            --json databaseId,jobs \
            --jq '[.[] | select(
              ([.jobs[] | select(.name == "Android Unit Tests" and .conclusion == "success")] | length > 0) and
              ([.jobs[] | select(.name == "Android Instrumented UI Tests" and .conclusion == "success")] | length > 0) and
              ([.jobs[] | select(.name == "Android Debug APK" and .conclusion == "success")] | length > 0)
            )] | first | .databaseId // empty')

          if [ -z "$RUN_ID" ]; then
            echo "No successful pipeline with unit tests, instrumented tests, and APK was found on branch $BRANCH."
            exit 1
          fi

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js for Firebase CLI
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download debug APK from current run
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.job != 'firebase-release'
        uses: actions/download-artifact@v4
        with:
          name: composeApp-debug-apk
          path: dist-apk

      - name: Download debug APK from prior successful run
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'firebase-release'
        uses: actions/download-artifact@v4
        with:
          name: composeApp-debug-apk
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.source-run.outputs.run_id }}
          path: dist-apk

      - name: Write Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_JSON secret is required for Firebase App Distribution."
            exit 1
          fi

          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Distribute debug APK to Firebase App Distribution
        id: firebase-distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
          FIREBASE_TESTERS: ${{ secrets.FIREBASE_TESTERS }}
          FIREBASE_GROUPS: ${{ secrets.FIREBASE_GROUPS }}
        run: |
          apk_path="dist-apk/composeApp-debug.apk"
          app_version="unknown"
          if [ -f gradle/app-version.properties ]; then
            lts="$(grep '^version.lts=' gradle/app-version.properties | cut -d= -f2-)"
            candidate="$(grep '^version.candidate=' gradle/app-version.properties | cut -d= -f2-)"
            if [ -n "$candidate" ] && [ "$candidate" -gt 0 ]; then
              app_version="${lts}-rc.${candidate}"
            else
              app_version="$lts"
            fi
          fi
          release_notes="v${app_version} — debug build from $GITHUB_REF_NAME at $GITHUB_SHA."
          if [ -f firebase-appdistribution-testcases.yaml ]; then
            checklist=$(grep -E '^  - id:' firebase-appdistribution-testcases.yaml | sed 's/^  - id: /- /' | head -12)
            release_notes=$(printf '%s\n\nQA checklist (firebase-appdistribution-testcases.yaml):\n%s' "$release_notes" "$checklist")
          fi

          args=(
            "$apk_path"
            "--app" "$FIREBASE_APP_ID"
            "--project" "$FIREBASE_PROJECT_ID"
            "--release-notes" "$release_notes"
          )

          if [ -n "$FIREBASE_TESTERS" ]; then
            args+=("--testers" "$FIREBASE_TESTERS")
          fi

          if [ -n "$FIREBASE_GROUPS" ]; then
            args+=("--groups" "$FIREBASE_GROUPS")
          fi

          set -o pipefail
          npx -y firebase-tools@latest appdistribution:distribute "${args[@]}" 2>&1 | tee "$RUNNER_TEMP/firebase-distribution.log"

      - name: Publish Firebase release status
        if: always()
        env:
          FIREBASE_DISTRIBUTION_OUTCOME: ${{ steps.firebase-distribution.outcome }}
        run: |
          {
            echo "## Firebase Release Upload"
            echo
            echo "- Distribution step: \`$FIREBASE_DISTRIBUTION_OUTCOME\`"

            if [ -f "$RUNNER_TEMP/firebase-distribution.log" ]; then
              echo
              echo "### Firebase Links"
              grep -Eo 'https://[^[:space:]]+' "$RUNNER_TEMP/firebase-distribution.log" | while read -r url; do
                label="Firebase link"
                case "$url" in
                  *console.firebase.google.com*) label="Firebase console" ;;
                  *appdistribution.firebase.google.com*) label="Tester release" ;;
                esac
                echo "- [$label]($url)"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Firebase release report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-release-report
          path: ${{ runner.temp }}/firebase-distribution.log
          if-no-files-found: ignore

  ios-compatibility:
    name: iOS Compatibility Signal
    runs-on: macos-15
    timeout-minutes: 25
    continue-on-error: true
    if: >-
      ${{ github.event_name == 'push' ||
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' &&
            (github.event.inputs.job == 'all' || github.event.inputs.job == 'ios-compatibility')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Compile iOS simulator Kotlin
        run: ./gradlew :composeApp:compileKotlinIosSimulatorArm64

  bump-version:
    name: Bump Application Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - android-tests
      - android-instrumented-tests
      - android-apk
      - firebase-release
    if: >-
      ${{ always() &&
          github.event_name == 'push' &&
          !startsWith(github.event.head_commit.message, 'chore(version):') &&
          needs.android-tests.result == 'success' &&
          needs.android-instrumented-tests.result == 'success' &&
          needs.android-apk.result == 'success' &&
          needs.firebase-release.result == 'success' &&
          (
            startsWith(github.ref, 'refs/heads/feature/') ||
            github.ref == 'refs/heads/main' ||
            github.ref == 'refs/heads/master'
          ) }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump version
        id: bump
        run: |
          chmod +x ./scripts/bump-app-version.sh
          if [[ "$GITHUB_REF" == refs/heads/main || "$GITHUB_REF" == refs/heads/master ]]; then
            MODE=lts
          else
            MODE=candidate
          fi
          OUTPUT="$(./scripts/bump-app-version.sh "$MODE")"
          echo "$OUTPUT"
          DISPLAY_NAME="$(echo "$OUTPUT" | grep '^display_name=' | cut -d= -f2-)"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "display_name=$DISPLAY_NAME" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        env:
          DISPLAY_NAME: ${{ steps.bump.outputs.display_name }}
          MODE: ${{ steps.bump.outputs.mode }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle/app-version.properties iosApp/iosApp/Info.plist
          if git diff --staged --quiet; then
            echo "No version changes to commit."
            exit 0
          fi
          git commit -m "chore(version): bump ${MODE} to ${DISPLAY_NAME} [skip ci]"
          git push
