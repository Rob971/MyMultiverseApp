name: KMP CI

on:
  push:
    branches:
      - main
      - master
      - "feature/**"
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - reopened
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run"
        required: true
        default: all
        type: choice
        options:
          - all
          - android-ci
          - android-instrumented-tests
          - supabase-migrations
          - ios-compatibility
          - release
      source_run_id:
        description: "For release-only: workflow run ID with a successful Android CI artifact (defaults to latest on branch)."
        required: false
        type: string

concurrency:
  group: kmp-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  FIREBASE_APP_ID: "1:37917280954:android:f25a8ccc787de9f3f91083"
  FIREBASE_PROJECT_ID: "mymultiverseapp"
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
  FIREBASE_TOOLS_VERSION: "13.29.1"
  GRADLE_BUILD_ARGS: --build-cache --parallel
  SUPABASE_PROJECT_REF: ivjdzreazvkrrirecznk

jobs:
  supabase-migrations:
    name: Supabase Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 6
    if: >-
      ${{ github.event_name == 'pull_request' ||
          (github.event_name == 'push' &&
            (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
          (github.event_name == 'workflow_dispatch' &&
            (github.event.inputs.job == 'all' || github.event.inputs.job == 'supabase-migrations')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Validate migrations locally
        run: |
          chmod +x ./scripts/ci-validate-supabase-migrations.sh
          ./scripts/ci-validate-supabase-migrations.sh

      - name: Set up Deno
        if: hashFiles('scripts/test-supabase-invite-edge.sh') != ''
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Test invite edge function helpers
        if: hashFiles('scripts/test-supabase-invite-edge.sh') != ''
        run: |
          chmod +x ./scripts/test-supabase-invite-edge.sh
          ./scripts/test-supabase-invite-edge.sh

      - name: Smoke-test linked Supabase project
        uses: ./.github/actions/require-supabase-secrets
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Remote household RPC smoke test
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_TEST_EMAIL: ${{ secrets.SUPABASE_TEST_EMAIL }}
          SUPABASE_TEST_PASSWORD: ${{ secrets.SUPABASE_TEST_PASSWORD }}
        run: |
          chmod +x ./scripts/verify-supabase-household.sh
          {
            echo "supabase.url=${SUPABASE_URL}"
            echo "supabase.anonKey=${SUPABASE_ANON_KEY}"
          } > local.properties
          if [ -z "${SUPABASE_TEST_EMAIL:-}" ] || [ -z "${SUPABASE_TEST_PASSWORD:-}" ]; then
            echo "::notice title=Supabase test account::Add SUPABASE_TEST_EMAIL and SUPABASE_TEST_PASSWORD repository secrets for authenticated RPC round-trip in CI."
          fi
          ./scripts/verify-supabase-household.sh

  android-ci:
    name: Android CI
    runs-on: ubuntu-latest
    timeout-minutes: 8
    if: >-
      ${{ github.event_name == 'push' ||
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' &&
            (github.event.inputs.job == 'all' ||
              github.event.inputs.job == 'android-ci')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}
          gradle-home-cache-cleanup: true

      - name: Android CI setup
        uses: ./.github/actions/android-ci-setup
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          google-services-json: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Require Supabase secrets
        uses: ./.github/actions/require-supabase-secrets
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Run Android unit tests and debug APK
        run: ./gradlew :composeApp:testDebugUnitTest :composeApp:assembleDebug ${{ env.GRADLE_BUILD_ARGS }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: composeApp-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  android-instrumented-tests:
    name: Android Instrumented UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: >-
      ${{ github.event_name == 'pull_request' ||
          (github.event_name == 'push' &&
            (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
          (github.event_name == 'workflow_dispatch' &&
            (github.event.inputs.job == 'all' || github.event.inputs.job == 'android-instrumented-tests')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}
          gradle-home-cache-cleanup: true

      - name: Android CI setup
        uses: ./.github/actions/android-ci-setup
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          google-services-json: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Require Supabase secrets
        uses: ./.github/actions/require-supabase-secrets
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-34-x86_64-${{ hashFiles('.github/workflows/kmp-ci.yml', 'composeApp/build.gradle.kts') }}
          restore-keys: |
            avd-api-34-x86_64-

      - name: Create AVD snapshot for cache
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          cores: 4
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Configure emulator boot options
        id: emulator-boot
        run: |
          if [ "${{ steps.avd-cache.outputs.cache-hit }}" = "true" ]; then
            echo "opts=-no-snapshot-save -snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none" >> "$GITHUB_OUTPUT"
          else
            echo "opts=-no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none" >> "$GITHUB_OUTPUT"
          fi

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          cores: 4
          force-avd-creation: false
          emulator-boot-timeout: 600
          disable-animations: true
          disable-spellchecker: true
          emulator-options: ${{ steps.emulator-boot.outputs.opts }}
          script: ./gradlew :composeApp:connectedDebugAndroidTest ${{ env.GRADLE_BUILD_ARGS }}

  ios-compatibility:
    name: iOS Compatibility Signal
    runs-on: macos-15
    timeout-minutes: 10
    continue-on-error: true
    if: >-
      ${{ github.event_name == 'pull_request' ||
          (github.event_name == 'push' &&
            (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
          (github.event_name == 'workflow_dispatch' &&
            (github.event.inputs.job == 'all' || github.event.inputs.job == 'ios-compatibility')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}
          gradle-home-cache-cleanup: true

      - name: Android CI setup
        uses: ./.github/actions/android-ci-setup

      - name: Compile iOS simulator Kotlin
        run: ./gradlew :composeApp:compileKotlinIosSimulatorArm64 ${{ env.GRADLE_BUILD_ARGS }}

  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 6
    needs:
      - android-ci
      - android-instrumented-tests
    if: >-
      ${{ always() && (
          (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'release') ||
          (needs.android-ci.result == 'success' && (
            ((github.event_name == 'push' || github.event_name == 'pull_request') &&
              (needs.android-instrumented-tests.result == 'success' ||
                needs.android-instrumented-tests.result == 'skipped')) ||
            (github.event_name == 'workflow_dispatch' &&
              github.event.inputs.job == 'all' &&
              needs.android-instrumented-tests.result == 'success')
          ))
        ) }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve prior successful pipeline run
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'release'
        id: source-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          run_has_apk() {
            gh run view "$1" --json jobs --jq '
              ([.jobs[] | select(.name == "Android CI" and .conclusion == "success")] | length > 0)
            '
          }

          RUN_ID="${{ github.event.inputs.source_run_id }}"
          if [ -n "$RUN_ID" ]; then
            if [ "$(run_has_apk "$RUN_ID")" != "true" ]; then
              echo "Run $RUN_ID is missing a successful Android CI job with APK artifact."
              exit 1
            fi
            echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="${GITHUB_REF#refs/heads/}"
          RUN_ID=$(gh run list \
            --workflow=kmp-ci.yml \
            --branch="$BRANCH" \
            --status=success \
            --limit=30 \
            --json databaseId,jobs \
            --jq '[.[] | select(
              ([.jobs[] | select(.name == "Android CI" and .conclusion == "success")] | length > 0)
            )] | first | .databaseId // empty')

          if [ -z "$RUN_ID" ]; then
            echo "No successful Android CI run with APK artifact was found on branch $BRANCH."
            exit 1
          fi

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download debug APK from current run
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.job != 'release'
        uses: actions/download-artifact@v4
        with:
          name: composeApp-debug-apk
          path: dist-apk

      - name: Download debug APK from prior successful run
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'release'
        uses: actions/download-artifact@v4
        with:
          name: composeApp-debug-apk
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.source-run.outputs.run_id }}
          path: dist-apk

      - name: Distribute to Firebase App Distribution
        uses: ./.github/actions/firebase-distribute
        with:
          apk-path: dist-apk/composeApp-debug.apk
          firebase-app-id: ${{ env.FIREBASE_APP_ID }}
          firebase-project-id: ${{ env.FIREBASE_PROJECT_ID }}
          firebase-tools-version: ${{ env.FIREBASE_TOOLS_VERSION }}
          firebase-service-account-json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          firebase-testers: ${{ secrets.FIREBASE_TESTERS }}
          firebase-groups: ${{ secrets.FIREBASE_GROUPS }}
          github-ref-name: ${{ github.ref_name }}
          github-sha: ${{ github.sha }}

      - name: Bump application version
        if: >-
          github.event_name == 'push' &&
          !startsWith(github.event.head_commit.message, 'chore(version):') &&
          (
            startsWith(github.ref, 'refs/heads/feature/') ||
            github.ref == 'refs/heads/main' ||
            github.ref == 'refs/heads/master'
          )
        id: bump
        run: |
          chmod +x ./scripts/bump-app-version.sh
          if [[ "$GITHUB_REF" == refs/heads/main || "$GITHUB_REF" == refs/heads/master ]]; then
            MODE=lts
          else
            MODE=candidate
          fi
          OUTPUT="$(./scripts/bump-app-version.sh "$MODE")"
          echo "$OUTPUT"
          DISPLAY_NAME="$(echo "$OUTPUT" | grep '^display_name=' | cut -d= -f2-)"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "display_name=$DISPLAY_NAME" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        if: >-
          github.event_name == 'push' &&
          !startsWith(github.event.head_commit.message, 'chore(version):') &&
          (
            startsWith(github.ref, 'refs/heads/feature/') ||
            github.ref == 'refs/heads/main' ||
            github.ref == 'refs/heads/master'
          )
        env:
          DISPLAY_NAME: ${{ steps.bump.outputs.display_name }}
          MODE: ${{ steps.bump.outputs.mode }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle/app-version.properties iosApp/iosApp/Info.plist
          if git diff --staged --quiet; then
            echo "No version changes to commit."
            exit 0
          fi
          git commit -m "chore(version): bump ${MODE} to ${DISPLAY_NAME} [skip ci]"
          git push
