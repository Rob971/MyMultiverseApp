name: KMP CI

on:
  push:
    branches:
      - main
      - master
      - "feature/**"
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - reopened
  workflow_dispatch:
    inputs:
      target:
        description: "Which pipeline section should run?"
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - android-tests
          - android-instrumented-tests
          - android-build
          - ios
          - firebase
          - firebase-release

concurrency:
  group: kmp-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FIREBASE_APP_ID: "1:37917280954:android:f25a8ccc787de9f3f91083"
  FIREBASE_PROJECT_ID: "mymultiverseapp"

jobs:
  android-tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      ${{ github.event_name == 'push' ||
          github.event_name == 'pull_request' ||
          contains(fromJSON('["all", "android", "android-tests", "firebase", "firebase-release"]'), github.event.inputs.target) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run Android unit tests
        run: ./gradlew :composeApp:testDebugUnitTest

  android-instrumented-tests:
    name: Android Instrumented UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      ${{ github.event_name == 'push' ||
          github.event_name == 'pull_request' ||
          contains(fromJSON('["all", "android", "android-instrumented-tests", "firebase", "firebase-release"]'), github.event.inputs.target) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          script: ./gradlew :composeApp:connectedDebugAndroidTest

  android-apk:
    name: Android Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: >-
      ${{ github.event_name == 'push' ||
          github.event_name == 'pull_request' ||
          contains(fromJSON('["all", "android", "android-tests", "android-build", "firebase", "firebase-release"]'), github.event.inputs.target) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Compile Android debug Kotlin
        run: ./gradlew :composeApp:compileDebugKotlinAndroid

      - name: Assemble Android debug APK
        run: ./gradlew :composeApp:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: composeApp-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  firebase-release:
    name: Firebase Release Upload
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - android-tests
      - android-instrumented-tests
      - android-apk
    if: >-
      ${{ github.event_name == 'push' ||
          github.event_name == 'pull_request' ||
          contains(fromJSON('["all", "firebase", "firebase-release"]'), github.event.inputs.target) }}

    steps:
      - name: Set up Node.js for Firebase CLI
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: composeApp-debug-apk
          path: dist-apk

      - name: Write Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_JSON secret is required for Firebase App Distribution."
            exit 1
          fi

          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Distribute debug APK to Firebase App Distribution
        id: firebase-distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
          FIREBASE_TESTERS: ${{ secrets.FIREBASE_TESTERS }}
          FIREBASE_GROUPS: ${{ secrets.FIREBASE_GROUPS }}
        run: |
          apk_path="dist-apk/composeApp-debug.apk"
          release_notes="Debug build from $GITHUB_REF_NAME at $GITHUB_SHA."
          if [ -f firebase-appdistribution-testcases.yaml ]; then
            checklist=$(grep -E '^  - id:' firebase-appdistribution-testcases.yaml | sed 's/^  - id: /- /' | head -12)
            release_notes=$(printf '%s\n\nQA checklist (firebase-appdistribution-testcases.yaml):\n%s' "$release_notes" "$checklist")
          fi

          args=(
            "$apk_path"
            "--app" "$FIREBASE_APP_ID"
            "--project" "$FIREBASE_PROJECT_ID"
            "--release-notes" "$release_notes"
          )

          if [ -n "$FIREBASE_TESTERS" ]; then
            args+=("--testers" "$FIREBASE_TESTERS")
          fi

          if [ -n "$FIREBASE_GROUPS" ]; then
            args+=("--groups" "$FIREBASE_GROUPS")
          fi

          set -o pipefail
          npx -y firebase-tools@latest appdistribution:distribute "${args[@]}" 2>&1 | tee "$RUNNER_TEMP/firebase-distribution.log"

      - name: Publish Firebase release status
        if: always()
        env:
          FIREBASE_DISTRIBUTION_OUTCOME: ${{ steps.firebase-distribution.outcome }}
        run: |
          {
            echo "## Firebase Release Upload"
            echo
            echo "- Distribution step: \`$FIREBASE_DISTRIBUTION_OUTCOME\`"

            if [ -f "$RUNNER_TEMP/firebase-distribution.log" ]; then
              echo
              echo "### Firebase Links"
              grep -Eo 'https://[^[:space:]]+' "$RUNNER_TEMP/firebase-distribution.log" | while read -r url; do
                label="Firebase link"
                case "$url" in
                  *console.firebase.google.com*) label="Firebase console" ;;
                  *appdistribution.firebase.google.com*) label="Tester release" ;;
                esac
                echo "- [$label]($url)"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Firebase release report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-release-report
          path: ${{ runner.temp }}/firebase-distribution.log
          if-no-files-found: ignore

  ios-compatibility:
    name: iOS Compatibility Signal
    runs-on: macos-15
    timeout-minutes: 25
    continue-on-error: true
    if: >-
      ${{ github.event_name == 'push' ||
          github.event_name == 'pull_request' ||
          github.event.inputs.target == 'all' ||
          github.event.inputs.target == 'ios' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Compile iOS simulator Kotlin
        run: ./gradlew :composeApp:compileKotlinIosSimulatorArm64
