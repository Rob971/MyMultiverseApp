name: KMP CI

on:
  push:
    branches:
      - main
      - master
      - release/**   # beta stabilization branches — triggers distribute-beta
    tags:
      - 'v[0-9]*'   # production releases — triggers distribute-production
  pull_request:
    branches:
      - main
      - master
      - release/**
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run"
        required: true
        default: all
        type: choice
        options:
          - all
          - android-ci
          - android-instrumented-tests
          - supabase-migrations
          - release              # bump version + Firebase alpha + commit + tag (manual named release)
          - distribute-alpha     # Firebase alpha distribute only (no bump, no commit)
          - distribute-beta      # signed AAB → Play Closed Testing
          - distribute-production # signed AAB → Play Production (staged rollout)
          - play-store-bundle
          - firebase-cleanup-releases
      version_bump:
        description: "Semver bump when running release or all (patch/minor/none)."
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - none
      keep_releases:
        description: "Firebase App Distribution releases to keep when running firebase-cleanup-releases."
        required: false
        default: "10"
        type: string
      cleanup_dry_run:
        description: "Preview Firebase release deletions without deleting (true/false)."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: kmp-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  pull-requests: read

env:
  FIREBASE_APP_ID: "1:37917280954:android:a0c28d6a257baf50f91083"
  FIREBASE_PROJECT_ID: "mymultiverseapp"
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
  FIREBASE_TOOLS_VERSION: "14.9.0"
  GRADLE_BUILD_ARGS: --build-cache --parallel
  SUPABASE_PROJECT_REF: ivjdzreazvkrrirecznk

jobs:
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.evaluate.outputs.run }}
    steps:
      - name: Evaluate skip rules
        id: evaluate
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Tag pushes always run — they trigger distribute-production.
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$COMMIT_MSG" == *"[skip ci]"* ]] || [[ "$COMMIT_MSG" == *"[ci skip]"* ]] || [[ "$COMMIT_MSG" == chore\(version\):* ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping CI for automated/version-only push."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  ci-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    needs: ci-gate
    if: needs.ci-gate.outputs.run == 'true'
    outputs:
      android_instrumented: ${{ steps.outputs.outputs.android_instrumented }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Filter Android-relevant paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            android_instrumented:
              - 'composeApp/**'
              - 'androidApp/**'
              - 'gradle/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - '.github/workflows/kmp-ci.yml'
              - '.github/actions/android-ci-setup/**'
              - 'scripts/ci-run-instrumented-tests.sh'

      - name: Publish path filter outputs
        id: outputs
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "android_instrumented=true" >> "$GITHUB_OUTPUT"
          else
            echo "android_instrumented=${{ steps.filter.outputs.android_instrumented }}" >> "$GITHUB_OUTPUT"
          fi

  supabase-migrations:
    name: Supabase Migrations
    runs-on: ubuntu-latest
    needs: ci-gate
    timeout-minutes: 6
    if: >-
      ${{ needs.ci-gate.outputs.run == 'true' &&
          (github.event_name == 'pull_request' ||
          (github.event_name == 'push' &&
            (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' ||
             startsWith(github.ref, 'refs/heads/release/'))) ||
          (github.event_name == 'workflow_dispatch' &&
            (github.event.inputs.job == 'all' || github.event.inputs.job == 'supabase-migrations'))) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.109.0

      - name: Validate migrations locally
        run: |
          chmod +x ./scripts/ci-validate-supabase-migrations.sh
          ./scripts/ci-validate-supabase-migrations.sh

      - name: Set up Deno
        if: hashFiles('scripts/test-supabase-invite-edge.sh') != ''
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Test invite edge function helpers
        if: hashFiles('scripts/test-supabase-invite-edge.sh') != ''
        run: |
          chmod +x ./scripts/test-supabase-invite-edge.sh
          ./scripts/test-supabase-invite-edge.sh

      - name: Smoke-test linked Supabase project
        uses: ./.github/actions/require-supabase-secrets
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Remote household RPC smoke test
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_TEST_EMAIL: ${{ secrets.SUPABASE_TEST_EMAIL }}
          SUPABASE_TEST_PASSWORD: ${{ secrets.SUPABASE_TEST_PASSWORD }}
        run: |
          chmod +x ./scripts/verify-supabase-household.sh
          {
            echo "supabase.url=${SUPABASE_URL}"
            echo "supabase.anonKey=${SUPABASE_ANON_KEY}"
          } > local.properties
          if [ -z "${SUPABASE_TEST_EMAIL:-}" ] || [ -z "${SUPABASE_TEST_PASSWORD:-}" ]; then
            echo "::notice title=Supabase test account::Add SUPABASE_TEST_EMAIL and SUPABASE_TEST_PASSWORD repository secrets for authenticated RPC round-trip in CI."
          fi
          ./scripts/verify-supabase-household.sh

  android-ci:
    name: Android CI
    runs-on: ubuntu-latest
    needs: ci-gate
    timeout-minutes: 10
    if: >-
      ${{ needs.ci-gate.outputs.run == 'true' &&
          (github.event_name == 'push' ||
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' &&
            (github.event.inputs.job == 'all' ||
              github.event.inputs.job == 'android-ci' ||
              github.event.inputs.job == 'android-instrumented-tests'))) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}
          gradle-home-cache-cleanup: true

      - name: Android CI setup
        uses: ./.github/actions/android-ci-setup
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          google-services-json: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Require Supabase secrets
        uses: ./.github/actions/require-supabase-secrets
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Run Android unit tests and build test APKs
        run: >-
          ./gradlew :composeApp:testDebugUnitTest :androidApp:assembleDebug
          :androidApp:assembleDebugAndroidTest ${{ env.GRADLE_BUILD_ARGS }}

      - name: Verify launcher activity is packaged in debug APK
        run: |
          chmod +x ./scripts/verify-android-apk-entrypoint.sh
          ./scripts/verify-android-apk-entrypoint.sh androidApp/build/outputs/apk/debug/androidApp-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: androidApp-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload instrumented test APKs
        uses: actions/upload-artifact@v4
        with:
          name: androidApp-instrumented-apks
          path: |
            androidApp/build/outputs/apk/debug/*.apk
            androidApp/build/outputs/apk/androidTest/debug/*.apk
          if-no-files-found: error

  android-instrumented-tests:
    name: Android Instrumented UI Tests
    runs-on: ubuntu-latest
    needs:
      - ci-gate
      - ci-changes
      - android-ci
    timeout-minutes: 10
    if: >-
      ${{ needs.ci-gate.outputs.run == 'true' &&
          needs.ci-changes.outputs.android_instrumented == 'true' &&
          needs.android-ci.result == 'success' &&
          (github.event_name == 'pull_request' ||
          (github.event_name == 'push' &&
            (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
          (github.event_name == 'workflow_dispatch' &&
            (github.event.inputs.job == 'all' || github.event.inputs.job == 'android-instrumented-tests'))) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download instrumented APKs from Android CI
        uses: actions/download-artifact@v4
        with:
          name: androidApp-instrumented-apks
          path: apks

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-34-x86_64-${{ hashFiles('.github/workflows/kmp-ci.yml', 'androidApp/build.gradle.kts', 'composeApp/build.gradle.kts') }}
          restore-keys: |
            avd-api-34-x86_64-

      - name: Create AVD snapshot for cache
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          cores: 4
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Configure emulator boot options
        id: emulator-boot
        run: |
          if [ "${{ steps.avd-cache.outputs.cache-hit }}" = "true" ]; then
            echo "opts=-no-snapshot-save -snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none" >> "$GITHUB_OUTPUT"
          else
            echo "opts=-no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none" >> "$GITHUB_OUTPUT"
          fi

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          cores: 4
          force-avd-creation: false
          emulator-boot-timeout: 600
          disable-animations: true
          disable-spellchecker: true
          emulator-options: ${{ steps.emulator-boot.outputs.opts }}
          script: |
            chmod +x ./scripts/ci-run-instrumented-tests.sh
            ./scripts/ci-run-instrumented-tests.sh apks

  # DISABLED: macOS runners bill at 10× Linux. Re-enable by restoring the
  # workflow_dispatch option and the `if` below.
  ios-compatibility:
    name: iOS Compatibility Signal
    runs-on: macos-15
    timeout-minutes: 10
    continue-on-error: true
    if: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}
          gradle-home-cache-cleanup: true

      - name: Android CI setup
        uses: ./.github/actions/android-ci-setup

      - name: Compile iOS simulator Kotlin
        run: ./gradlew :composeApp:compileKotlinIosSimulatorArm64 ${{ env.GRADLE_BUILD_ARGS }}

  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - ci-gate
      - android-ci
      - android-instrumented-tests
    if: >-
      ${{ always() &&
          needs.ci-gate.outputs.run == 'true' &&
          (
            (
              github.event_name == 'workflow_dispatch' &&
              (
                github.event.inputs.job == 'release' ||
                (
                  github.event.inputs.job == 'all' &&
                  needs.android-ci.result == 'success' &&
                  (needs.android-instrumented-tests.result == 'success' ||
                    needs.android-instrumented-tests.result == 'skipped')
                )
              )
            ) ||
            (
              github.event_name == 'push' &&
              contains(github.event.head_commit.message, '[trigger-release]')
            )
          ) }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Bump application version
        id: bump
        run: |
          chmod +x ./scripts/bump-app-version.sh
          BUMP="${{ github.event.inputs.version_bump }}"
          if [[ "${{ github.event_name }}" == "push" && -f .github/release-request ]]; then
            BUMP="$(grep '^version_bump=' .github/release-request | cut -d= -f2- || true)"
          fi
          BUMP="${BUMP:-patch}"
          OUTPUT="$(./scripts/bump-app-version.sh "$BUMP")"
          echo "$OUTPUT"
          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done <<< "$OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-cleanup: true

      - name: Android CI setup
        uses: ./.github/actions/android-ci-setup
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          google-services-json: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Require Supabase secrets
        uses: ./.github/actions/require-supabase-secrets
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Build debug APK for release
        run: ./gradlew :androidApp:assembleDebug ${{ env.GRADLE_BUILD_ARGS }}

      - name: Verify launcher activity is packaged in debug APK
        run: |
          chmod +x ./scripts/verify-android-apk-entrypoint.sh
          ./scripts/verify-android-apk-entrypoint.sh androidApp/build/outputs/apk/debug/androidApp-debug.apk

      - name: Print Android App Links fingerprint (debug APK)
        id: app_links_fingerprint
        run: |
          chmod +x ./scripts/print-android-apk-fingerprint.sh
          FINGERPRINT="$(./scripts/print-android-apk-fingerprint.sh androidApp/build/outputs/apk/debug/androidApp-debug.apk)"
          echo "sha256=${FINGERPRINT}" >> "$GITHUB_OUTPUT"
          echo "ANDROID_SHA256_FINGERPRINT=${FINGERPRINT}"
          echo "Use this value as ANDROID_SHA256_FINGERPRINT in Rob971/mymultiverse-website when deploying hosting."

      - name: Validate Firebase service account secret
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [[ -z "${FIREBASE_SERVICE_ACCOUNT_JSON}" ]]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON is not set. Add the Firebase service account JSON in GitHub repo secrets."
            exit 1
          fi
          printf '%s' "${FIREBASE_SERVICE_ACCOUNT_JSON}" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for key in ('type', 'project_id', 'private_key', 'client_email'):
              if key not in data:
                  raise SystemExit(f'Missing key in service account JSON: {key}')
          print(f'Firebase service account: {data[\"client_email\"]}')
          "

      - name: Distribute to Firebase App Distribution
        uses: ./.github/actions/firebase-distribute
        with:
          apk-path: androidApp/build/outputs/apk/debug/androidApp-debug.apk
          firebase-app-id: ${{ env.FIREBASE_APP_ID }}
          firebase-project-id: ${{ env.FIREBASE_PROJECT_ID }}
          firebase-tools-version: ${{ env.FIREBASE_TOOLS_VERSION }}
          firebase-service-account-json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          firebase-testers: ${{ secrets.FIREBASE_TESTERS }}
          firebase-groups: ${{ secrets.FIREBASE_GROUPS }}
          github-ref-name: ${{ github.ref_name }}
          github-sha: ${{ github.sha }}

      - name: Commit version bump, tag release, and push
        env:
          DISPLAY_NAME: ${{ steps.bump.outputs.display_name }}
          TAG_NAME: ${{ steps.bump.outputs.tag_name }}
          VERSION_BUMP: ${{ github.event.inputs.version_bump }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle/app-version.properties iosApp/iosApp/Info.plist
          if git diff --staged --quiet; then
            echo "No version changes to commit."
            exit 0
          fi
          git commit -m "chore(version): release ${DISPLAY_NAME} (${VERSION_BUMP:-patch}) [skip ci]"
          git tag "$TAG_NAME"
          git push
          git push origin "$TAG_NAME"

  # ─────────────────────────────────────────────────────────────────────────
  # ALPHA TRACK — automatic Firebase App Distribution on every green main push.
  # No version bump, no git commit; the github.run_number surfaces in release notes.
  # Also runnable manually: workflow_dispatch → job=distribute-alpha.
  # ─────────────────────────────────────────────────────────────────────────
  distribute-alpha:
    name: Alpha — Firebase App Distribution
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - ci-gate
      - android-ci
      - android-instrumented-tests
    if: >-
      ${{ always() &&
          needs.ci-gate.outputs.run == 'true' &&
          needs.android-ci.result == 'success' &&
          (needs.android-instrumented-tests.result == 'success' ||
           needs.android-instrumented-tests.result == 'skipped') &&
          (
            (github.event_name == 'push' &&
             (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
            (github.event_name == 'workflow_dispatch' &&
             github.event.inputs.job == 'distribute-alpha')
          ) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true
          gradle-home-cache-cleanup: false

      - name: Android CI setup
        uses: ./.github/actions/android-ci-setup
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          google-services-json: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Require Supabase secrets
        uses: ./.github/actions/require-supabase-secrets
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Build debug APK (alpha track)
        run: ./gradlew :androidApp:assembleDebug ${{ env.GRADLE_BUILD_ARGS }}

      - name: Verify launcher activity in debug APK
        run: |
          chmod +x ./scripts/verify-android-apk-entrypoint.sh
          ./scripts/verify-android-apk-entrypoint.sh androidApp/build/outputs/apk/debug/androidApp-debug.apk

      - name: Validate Firebase service account secret
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [[ -z "${FIREBASE_SERVICE_ACCOUNT_JSON}" ]]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON is not set. Add the Firebase service account JSON in GitHub repo secrets."
            exit 1
          fi
          printf '%s' "${FIREBASE_SERVICE_ACCOUNT_JSON}" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for key in ('type', 'project_id', 'private_key', 'client_email'):
              if key not in data:
                  raise SystemExit(f'Missing key in service account JSON: {key}')
          print(f'Firebase service account: {data[\"client_email\"]}')
          "

      - name: Distribute to Firebase App Distribution (alpha group)
        uses: ./.github/actions/firebase-distribute
        with:
          apk-path: androidApp/build/outputs/apk/debug/androidApp-debug.apk
          firebase-app-id: ${{ env.FIREBASE_APP_ID }}
          firebase-project-id: ${{ env.FIREBASE_PROJECT_ID }}
          firebase-tools-version: ${{ env.FIREBASE_TOOLS_VERSION }}
          firebase-service-account-json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          firebase-testers: ${{ secrets.FIREBASE_ALPHA_TESTERS }}
          firebase-groups: ${{ secrets.FIREBASE_ALPHA_GROUPS }}
          github-ref-name: ${{ github.ref_name }}
          github-sha: ${{ github.sha }}

  # ─────────────────────────────────────────────────────────────────────────
  play-store-bundle:
    name: Play Store bundle (signed AAB)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      ${{ github.event_name == 'workflow_dispatch' &&
          github.event.inputs.job == 'play-store-bundle' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-cleanup: true

      - name: Android CI setup
        uses: ./.github/actions/android-ci-setup
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          google-services-json: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Require Supabase secrets
        uses: ./.github/actions/require-supabase-secrets
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Configure Play upload signing
        uses: ./.github/actions/android-release-signing-setup
        with:
          keystore-base64: ${{ secrets.AMMO_UPLOAD_KEYSTORE_BASE64 }}
          store-password: ${{ secrets.AMMO_UPLOAD_STORE_PASSWORD }}
          key-alias: ${{ secrets.AMMO_UPLOAD_KEY_ALIAS }}
          key-password: ${{ secrets.AMMO_UPLOAD_KEY_PASSWORD }}

      - name: Build signed release AAB
        run: ./gradlew :androidApp:bundleRelease ${{ env.GRADLE_BUILD_ARGS }}

      - name: Print Android App Links fingerprint (release keystore)
        env:
          KEY_ALIAS: ${{ secrets.AMMO_UPLOAD_KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.AMMO_UPLOAD_STORE_PASSWORD }}
        run: |
          chmod +x ./scripts/print-android-keystore-fingerprint.sh
          FINGERPRINT="$(./scripts/print-android-keystore-fingerprint.sh \
            "${AMMO_UPLOAD_STORE_FILE}" "${KEY_ALIAS}" "${STORE_PASSWORD}")"
          echo "ANDROID_SHA256_FINGERPRINT=${FINGERPRINT}"
          echo "Use this value as ANDROID_SHA256_FINGERPRINT in Rob971/mymultiverse-website when Play/App Links use the upload (or Play App Signing) certificate."

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: androidApp-release-aab
          path: androidApp/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # BETA TRACK — signed AAB → Google Play Closed Testing on release/** push.
  # versionCode uses the CI run-number formula with RELEASE_TRACK=beta (offset 1).
  # Requires secret: AMMO_PLAY_SERVICE_ACCOUNT_JSON (Google Play Developer API).
  # ─────────────────────────────────────────────────────────────────────────
  distribute-beta:
    name: Beta — Play Closed Testing (signed AAB)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - ci-gate
      - android-ci
    if: >-
      ${{ always() &&
          needs.ci-gate.outputs.run == 'true' &&
          needs.android-ci.result == 'success' &&
          (
            (github.event_name == 'push' &&
             startsWith(github.ref, 'refs/heads/release/')) ||
            (github.event_name == 'workflow_dispatch' &&
             github.event.inputs.job == 'distribute-beta')
          ) }}
    env:
      RELEASE_TRACK: beta

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed to count commits on release branch

      - name: Stamp beta prerelease label (in-memory, no git commit)
        id: stamp
        run: |
          # Derive beta sequence: number of commits on this release branch since it diverged from main.
          MERGE_BASE="$(git merge-base HEAD origin/main 2>/dev/null || git rev-parse HEAD~1)"
          BETA_SEQ="$(git rev-list --count HEAD ^"$MERGE_BASE" 2>/dev/null || echo 1)"
          BETA_SEQ="${BETA_SEQ:-1}"
          # Stamp version.prerelease in the properties file (not committed — build-time only).
          if grep -q '^version\.prerelease=' gradle/app-version.properties; then
            sed -i "s|^version\.prerelease=.*|version.prerelease=beta.${BETA_SEQ}|" gradle/app-version.properties
          else
            echo "version.prerelease=beta.${BETA_SEQ}" >> gradle/app-version.properties
          fi
          echo "beta_seq=${BETA_SEQ}" >> "$GITHUB_OUTPUT"
          VERSION_NAME="$(grep '^version\.name=' gradle/app-version.properties | cut -d= -f2-)"
          echo "version_display=${VERSION_NAME}-beta.${BETA_SEQ}" >> "$GITHUB_OUTPUT"
          echo "Beta label: ${VERSION_NAME}-beta.${BETA_SEQ} (sequence ${BETA_SEQ})"

      - name: Check Play Store service account secret
        id: play_secret_check
        shell: bash
        env:
          AMMO_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.AMMO_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [[ -z "${AMMO_PLAY_SERVICE_ACCOUNT_JSON}" ]]; then
            echo "::warning::AMMO_PLAY_SERVICE_ACCOUNT_JSON is not set. Add the Google Play Developer API service account JSON as a GitHub repo secret to enable automated Play Store uploads. Skipping upload."
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true
          gradle-home-cache-cleanup: false

      - name: Android CI setup
        uses: ./.github/actions/android-ci-setup
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          google-services-json: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Configure Play upload signing
        uses: ./.github/actions/android-release-signing-setup
        with:
          keystore-base64: ${{ secrets.AMMO_UPLOAD_KEYSTORE_BASE64 }}
          store-password: ${{ secrets.AMMO_UPLOAD_STORE_PASSWORD }}
          key-alias: ${{ secrets.AMMO_UPLOAD_KEY_ALIAS }}
          key-password: ${{ secrets.AMMO_UPLOAD_KEY_PASSWORD }}

      - name: Build signed release AAB (beta)
        run: ./gradlew :androidApp:bundleRelease ${{ env.GRADLE_BUILD_ARGS }}

      - name: Upload signed AAB artifact (beta)
        uses: actions/upload-artifact@v4
        with:
          name: androidApp-beta-aab-${{ github.run_number }}
          path: androidApp/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload to Play Closed Testing
        if: steps.play_secret_check.outputs.has_secret == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.AMMO_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.mymultiverse.ammo
          releaseFiles: androidApp/build/outputs/bundle/release/*.aab
          track: beta
          status: completed
          whatsNewDirectory: distribution/whatsnew

      - name: Summarize beta release
        if: always()
        shell: bash
        run: |
          {
            echo "## Beta Release Summary"
            echo
            echo "- **Version:** \`${{ steps.stamp.outputs.version_display }}\`"
            echo "- **Run:** \`${{ github.run_number }}\`"
            echo "- **Branch:** \`${{ github.ref_name }}\`"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Play upload:** ${{ steps.play_secret_check.outputs.has_secret == 'true' && 'uploaded to Closed Testing' || 'skipped (AMMO_PLAY_SERVICE_ACCOUNT_JSON not set)' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────────────
  # PRODUCTION TRACK — signed AAB → Play Production (20% staged rollout) on v* tag push.
  # versionCode uses the CI run-number formula with RELEASE_TRACK=production (offset 2).
  # Hotfixes: tag vX.Y.Z-hotfix.N on main — same trigger, same job.
  # Requires secret: AMMO_PLAY_SERVICE_ACCOUNT_JSON.
  # ─────────────────────────────────────────────────────────────────────────
  distribute-production:
    name: Production — Play Store (signed AAB, staged rollout)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - ci-gate
      - android-ci
      - android-instrumented-tests
    if: >-
      ${{ always() &&
          needs.ci-gate.outputs.run == 'true' &&
          needs.android-ci.result == 'success' &&
          (needs.android-instrumented-tests.result == 'success' ||
           needs.android-instrumented-tests.result == 'skipped') &&
          (
            (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
            (github.event_name == 'workflow_dispatch' &&
             github.event.inputs.job == 'distribute-production')
          ) }}
    env:
      RELEASE_TRACK: production
    permissions:
      contents: write   # needed to create a GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve version from tag or properties file
        id: version
        run: |
          # On tag push: strip leading 'v'; on manual dispatch: read from properties.
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
            DISPLAY="${TAG#v}"
          else
            NAME="$(grep '^version\.name=' gradle/app-version.properties | cut -d= -f2-)"
            PRE="$(grep '^version\.prerelease=' gradle/app-version.properties | cut -d= -f2- || true)"
            DISPLAY="${NAME}${PRE:+-$PRE}"
          fi
          echo "display=${DISPLAY}" >> "$GITHUB_OUTPUT"
          echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "Production version: ${DISPLAY}"

      - name: Check Play Store service account secret
        id: play_secret_check
        shell: bash
        env:
          AMMO_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.AMMO_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [[ -z "${AMMO_PLAY_SERVICE_ACCOUNT_JSON}" ]]; then
            echo "::warning::AMMO_PLAY_SERVICE_ACCOUNT_JSON is not set. Skipping Play Store upload. Add the Google Play Developer API service account JSON as a GitHub repo secret."
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true
          gradle-home-cache-cleanup: false

      - name: Android CI setup
        uses: ./.github/actions/android-ci-setup
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          google-services-json: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Configure Play upload signing
        uses: ./.github/actions/android-release-signing-setup
        with:
          keystore-base64: ${{ secrets.AMMO_UPLOAD_KEYSTORE_BASE64 }}
          store-password: ${{ secrets.AMMO_UPLOAD_STORE_PASSWORD }}
          key-alias: ${{ secrets.AMMO_UPLOAD_KEY_ALIAS }}
          key-password: ${{ secrets.AMMO_UPLOAD_KEY_PASSWORD }}

      - name: Build signed release AAB (production)
        run: ./gradlew :androidApp:bundleRelease ${{ env.GRADLE_BUILD_ARGS }}

      - name: Upload signed AAB artifact (production)
        uses: actions/upload-artifact@v4
        with:
          name: androidApp-production-aab-${{ github.run_number }}
          path: androidApp/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 90

      - name: Upload to Play Production (20% staged rollout)
        if: steps.play_secret_check.outputs.has_secret == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.AMMO_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.mymultiverse.ammo
          releaseFiles: androidApp/build/outputs/bundle/release/*.aab
          track: production
          status: inProgress
          userFraction: 0.20
          whatsNewDirectory: distribution/whatsnew

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.version.outputs.display }}"
          body: |
            **Release:** `${{ steps.version.outputs.display }}`
            **Track:** Production (20% staged rollout — increase in Play Console after monitoring)
            **Build:** run `${{ github.run_number }}` · commit `${{ github.sha }}`

            See `distribution/whatsnew/whatsnew-en-US` for user-facing changelog.
          files: androidApp/build/outputs/bundle/release/*.aab
          draft: false
          prerelease: ${{ contains(github.ref_name, 'hotfix') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}

      - name: Summarize production release
        if: always()
        shell: bash
        run: |
          {
            echo "## Production Release Summary"
            echo
            echo "- **Version:** \`${{ steps.version.outputs.display }}\`"
            echo "- **Tag:** \`${{ steps.version.outputs.tag }}\`"
            echo "- **Run:** \`${{ github.run_number }}\`"
            echo "- **Rollout:** 20% staged (expand manually in Play Console after soak)"
            echo "- **Play upload:** ${{ steps.play_secret_check.outputs.has_secret == 'true' && 'uploaded to Production' || 'skipped (AMMO_PLAY_SERVICE_ACCOUNT_JSON not set)' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────────────
  firebase-cleanup-releases:
    name: Firebase App Distribution cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      ${{ github.event_name == 'workflow_dispatch' &&
          github.event.inputs.job == 'firebase-cleanup-releases' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install google-auth requests

      - name: Prune older App Distribution releases
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          KEEP_RELEASES: ${{ github.event.inputs.keep_releases }}
          CLEANUP_DRY_RUN: ${{ github.event.inputs.cleanup_dry_run }}
        run: |
          if [[ -z "${FIREBASE_SERVICE_ACCOUNT_JSON}" ]]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON is not set."
            exit 1
          fi
          args=(--keep "${KEEP_RELEASES:-10}")
          if [[ "${CLEANUP_DRY_RUN}" == "true" ]]; then
            args+=(--dry-run)
          fi
          python3 scripts/cleanup-firebase-appdistribution-releases.py "${args[@]}"
